[project]
name = "cyclerfinder"
version = "0.0.1"
description = "Systematically find, rank, and verify planetary cycler trajectories."
readme = "README.md"
requires-python = ">=3.11,<3.12"
dependencies = [
    "numpy>=2.0",
    "scipy>=1.13",
    "astropy>=7.0",
    "jplephem>=2.22",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-cov>=5",
    "ruff>=0.6",
    "mypy>=1.11",
    "numpy>=2.0",
    "lamberthub>=1.0,<2.0",
    "scipy-stubs>=1.13",
]
viz = [
    "matplotlib>=3.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cyclerfinder"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "SIM", "RUF"]

[tool.ruff.format]
# Defaults are PEP 8 compatible; keep them.

[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_ignores = true
disallow_any_unimported = true
plugins = []

# astropy ships partial type stubs; treat its sub-modules as Any rather than
# fail strict mode on third-party untyped surfaces. This is a pragmatic choice;
# revisit if astropy's stub coverage improves materially.
[[tool.mypy.overrides]]
module = ["astropy.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra -q --strict-markers"
