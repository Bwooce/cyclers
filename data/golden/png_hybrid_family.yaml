# Png' hybrid DRO/Lyapunov-bridge family — sourced golden (#450)
#
# Source: Zhou, Anoè, Armellin, Qiao, Li, "Identifying Fixed Points in the
# Three-Body Problem Using a High-Order Transfer Map," arXiv:2509.12671 (v1,
# 16 Sep 2025). Table 3 (first planar case, C_J = 3.00022) + Table 5 (second
# planar case, C_J = 3.020052). Transcribed verbatim in
# docs/notes/2026-06-13-high-order-transfer-map-2509.12671-mining.md.
#
# EXPECTED side traces ONLY to the paper — never to a value our own
# enumerator/corrector computed (feedback_golden_tests_sourced_only).
#
# Earth-Moon CRTBP, paper mu = 0.012150584269940354 (Table 1). Planar state
# [x0, 0, 0, xdot0, ydot0, 0] on the y=0 Poincare section. "n" is the revolution
# (g'-bifurcation) count. Png' members are NON-symmetric (xdot0 != 0) and
# multi-revolution g'-bifurcations — structurally out of reach for single-family
# continuation from symmetric perpendicular-crossing seeds. Png' is a CR3BP
# PERIODIC ORBIT, not a cycler: a validation/cross-check target only, never a
# catalogue row.
#
# half_crossings / ydot0_sign: the y=0-return-map mapping for
# search.cr3bp_general_periodic.correct_general_periodic. The full state returns
# to the IC at the (2n)-th y=0 crossing, so half_crossings = 2*n (derived
# geometrically: the published period equals the time of the 2n-th crossing for
# every member). The paper's ydot0 are all positive, so ydot0_sign = +1.0. These
# are the corrector's per-member seeding parameters, NOT golden expected values.

source: "arXiv:2509.12671"
system: "Earth-Moon"
paper_mu: 0.012150584269940354
jacobi_convention: "C = (x^2+y^2) + 2(1-mu)/r1 + 2mu/r2 - (vx^2+vy^2+vz^2)"
state_convention: "planar [x0, 0, 0, xdot0, ydot0, 0] on the y=0 section"

