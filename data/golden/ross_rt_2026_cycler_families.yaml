# Ross & Roberts-Tsoukkas (2026) — stable ballistic prograde (k1,k2)-cyclers
# Sourced from: arXiv:2606.29189v1 [nlin.CD], 28 Jun 2026, "Stable Families of
#   Ballistic Prograde Cyclers in the Restricted Three-Body Problem", TABLE I.
# Source: arXiv:2606.29189 (Ross, Roberts-Tsoukkas 2026)
# Digest: docs/notes/2026-06-30-digest-ross-roberts-tsoukkas-2026-stable-ballistic-cyclers.md
#
# Planar CR3BP. Primaries m1=1-mu at x=-mu, m2=mu at x=1-mu; mu in (0, 1/2].
# Jacobi convention (paper Eq. 2): C = -2*Ubar - (xdot^2+ydot^2),
#   Ubar = -1/2(x^2+y^2) - (1-mu)/r1 - mu/r2.  IDENTICAL to core/cr3bp.py::jacobi_constant.
# Symmetric perpendicular x-axis crossing: y0 = xdot0 = 0; ydot0 from C
#   (= search/cr3bp_periodic.py::ydot0_from_jacobi, Ross Eq. 9). T = full period.
# (sp, sv) = full-period planar/vertical stability indices = 1/2(lambda + 1/lambda);
#   all listed orbits are FULLY stable: max(|sp|,|sv|) < 1.

source: "Ross & Roberts-Tsoukkas 2026, arXiv:2606.29189v1, Table I"

