# 12. Sanchez Net 2022 EEM near-ballistic cycler (Fig. 2a, Cycler 1)
# ---------------------------------------------------------------------------
- id: sanchez-net-2022-eem-cycler1
  name: "Sanchez Net 2022 EEM near-ballistic Earth-Mars cycler (Fig. 2a Cycler 1)"
  source: literature
  trajectory_regime: ballistic   # near-ballistic (max unoptimised delta-v 5 m/s per flyby — Sanchez Net Fig. 2a event 4); classed ballistic per schema v1 convention
  model_assumption: analytic-ephemeris   # schema v2 (2026-06-01); real-date patched-conic from JPL STAR tool; circular-coplanar | analytic-ephemeris | cr3bp; see data/README.md
  cycler_class: multi-arc   # schema v4 (2026-06-03); EEM structure — no single repeating (a,e) conic; single-ellipse | multi-arc | non-keplerian; see docs/notes/multi-arc-classification.md
  orbit_class: cycler   # schema v4.7 (2026-06-15, task #294); scope expansion default — every pre-v4.7 row is a strict cycler (scripts/migrate_catalogue_scope_2026-06-15.py); see data/README.md
  epoch_locked: false   # schema v4.7 (task #294); strict cyclers are NOT epoch-locked
  n_returns: infinite   # schema v4.7 (task #294); strict cyclers complete an unbounded number of returns
  invariants:   # schema v4 (2026-06-03); cycle-level identity for multi-arc cyclers; see docs/spec.md §16.7.4
    aphelion_ratio:        # not tabulated — patched-conic, no single aphelion characterises the multi-arc trajectory
    transit_times_days: [136, 255]   # DERIVED from Fig. 2a dates: first M->E leg = 136 d (events 3->4); second M->E leg = 255 d (events 6->7). These vary by cycle; first-cycle E->M = 968 d. Representative values for the recurring M->E (short-return) legs cited here.
    turn_ratio:        # not tabulated in Sanchez Net 2022; patched-conic near-ballistic (Δv ≤ 10 m/s per flyby), not a Russell-style turn-ratio analysis
  delta_v_kms: 0.005   # SOURCED: Sanchez Net 2022 Fig. 2a event 4 shows 5 m/s Δv at Earth flyby (04/11/22); unoptimised patched-conic; the fully-optimised value will be lower.
  v_infinity_leveraging_dv_kms:        # schema v2; not an establishment variant; this is the direct injection/cycler maintenance budget
  fleet_size:        # schema v2; integer count; this row is one individual cycler from the network, not the fleet
  flyby_mechanics:   # SOURCED: Sanchez Net 2022 Fig. 2a event altitudes. altitude_km sourced from figure; turning_angle_deg not tabulated in paper.
  - body: "E"
    turning_angle_deg:
    min_altitude_km: 6200      # SOURCED: Fig. 2a event 2 (Earth flyby 11/13/2032): 6200 km
  - body: "M"
    turning_angle_deg:
    min_altitude_km: 65000     # SOURCED: Fig. 2a event 3 (Mars flyby 07/09/2035): 65000 km
  - body: "E"
    turning_angle_deg:
    min_altitude_km:           # event 4 (Earth 11/22/2035): altitude not legible — see data_gaps[]
  - body: "E"
    turning_angle_deg:
    min_altitude_km: 14100     # SOURCED: Fig. 2a event 5 (Earth flyby 05/20/2036): 14100 km
  - body: "M"
    turning_angle_deg:
    min_altitude_km: 2040      # SOURCED: Fig. 2a event 6 (Mars flyby 10/25/2041): 2040 km
  - body: "E"
    turning_angle_deg:
    min_altitude_km: 6350      # SOURCED: Fig. 2a event 7 (Earth flyby 07/07/2042): 6350 km
  - body: "E"
    turning_angle_deg:
    min_altitude_km: 14000     # SOURCED: Fig. 2a event 8 (Earth flyby 07/18/2044): 14000 km
  - body: "M"
    turning_angle_deg:
    min_altitude_km: 14800     # SOURCED: Fig. 2a event 9 (Mars flyby 02/06/2046): 14800 km
  bodies: ["E", "M"]
  sequence_canonical: "E-E-M"   # lex-min cyclic rotation of EEM (Earth-Earth-Mars) encounter sequence; one Mars visit per 2-synodic period cycle; see Sanchez Net 2022 p. 862 Fig. 2a caption "EEM"
  sense: "outbound"
  period:
    pair: "E-M"
    k: 2
    years: 4.28   # SOURCED/DERIVED: events 6 (Mars 10/25/2041) to 9 (Mars 02/06/2046) = 1565 days = 4.28 yr ≈ 2 × 2.135 yr synodic; Sanchez Net Fig. 2a caption: "1 Mars visit every 2 synodic periods"
    note: "Period is the Mars-to-Mars repeat interval in the repeating phase; first cycle (events 3->6) spans ~6.3 yr = 3 syn due to the initial launch phase. The 4.28 yr steady-state repeat (events 6->9) confirms k=2."
  vinf_kms_at_encounters:
