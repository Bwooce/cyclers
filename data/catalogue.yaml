    modelled; Enceladus / Mimas / Tethys cyclers tend toward
    low-energy / manifold regimes that are CR3BP-natural). Treat as
    "candidates for future ingest" pending model decision; for now
    record the citation only.

    Per search-snippet abstract: "the Saturn-Titan-Enceladus system was
    investigated in the most detail in the context of recent Cassini
    discoveries"; "For the Titan-Enceladus cyclers, Saturn's G rings
    pose a hazard out to approximately 176,000 km"; "several of the
    high energy Titan-Enceladus cyclers found immediate application as
    Cassini extended missions options that provide frequent low
    altitude Enceladus flybys."

    Sibling of the Jovian-family entry above. As individual cyclers
    are split out, they may need new body codes for Saturnian moons
    (already reserved in data/README.md schema-extended section).

    TIER-1/TIER-2 SPLIT (moon-tour Tier-1, task #76): Titan members are
    Tier-1 patched-conic-modellable (primary: Saturn, circular-coplanar
    V_inf about Saturn); midsize-moon members (Mimas/Enceladus/Tethys)
    defer to the CR3BP Tier-2 milestone. As individual Titan cyclers are
    split out they take cycler_class: multi-arc / model_assumption:
    circular-coplanar. This family-seed row stays cycler_class:
    non-keplerian because its midsize members are genuinely CR3BP — no
    silent whole-row re-tag (that would falsely claim the
    Enceladus/Mimas members are patched-conic). An individual Titan-only
    row is created only when a sourced member is ingested.
  source_quotes:
    notes: |
      Russell/Strange 2009 JGCD abstract (via web search snippets):
      "the Saturn-Titan-Enceladus system was investigated in the most
      detail in the context of recent Cassini discoveries"; "For the
      Titan-Enceladus cyclers, Saturn's G rings pose a hazard out to
      approximately 176,000 km."

