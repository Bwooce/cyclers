  source_quotes:
    delta_v_kms: "Derived from Russell 2004's tabulated AR / TR via the M2 powered-flyby surrogate (src/cyclerfinder/core/flyby.py): ΔV ≈ (V∞_E + V∞_M) × max(0, 1 − TR) + (1 − AR) × (V∞_E + V∞_M) × 0.025 [AR-correction term active only when AR < 1]. Upper bound; biases near-ballistic entries toward 'requires nudge'. Strict-ballistic rows (AR ≥ 1 AND TR ≥ 1) give ΔV = 0 exactly. AR/TR primary values: Russell 2004 Table 3.11, row 6.15.1.+4."
