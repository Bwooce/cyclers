    "period.years": |
      Derived: 2 x Earth-Mars synodic period 2.135 yr = 4.27 yr. Russell
      dissertation does not separately tabulate the cycler period in
      years; the "2" suffix in 4.991gG2 indicates 2 synodic periods per
      Russell §4.7 and §5.5 (dissertation line 7375).
    name: |
      Russell 2004 dissertation line 7416: "cycler 4.991gG2(#83) ...
      Also known as the 'S1L1' cycler". Line 5476: "notable 'S1L1'
      cycler ... discovered first by McConaghy et al. in Ref. 15".
