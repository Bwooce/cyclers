    SUPERSEDES NUMERICALLY (for orbital/V_inf data) catalogue entry 2
    (mcconaghy-2006-em-k2) — same physical cycler, different
    nomenclature framing. Both entries preserved: entry 2 carries the
    McConaghy SnLm-convention citation (V_inf 4.7/5.0 from the JSR
    paper's realistic-ephemeris optimisation, 153-d ToF), this entry
    carries Russell's circular-coplanar simple-model values from Table
    4.9 (V_inf 4.99/5.10, 150-d ToF, aphel 1.64 AU).

    Discrepancy analysis:
    - V_inf E: McConaghy 2006 = 4.7 vs Russell 2004 = 4.99 (Δ = 0.29 km/s)
    - V_inf M: McConaghy 2006 = 5.0 vs Russell 2004 = 5.10 (Δ = 0.10 km/s)
    - E-M ToF: McConaghy 2006 = 153 d vs Russell 2004 = 150 d (Δ = 3 d)

    The most plausible explanation per Russell's own text (dissertation
    line 7416): McConaghy 2006 reports ephemeris-optimised values for a
    realistic launch, while Russell Table 4.9 reports the circular-
    coplanar simple-model reference values. Russell explicitly states
    this cycler "is essentially ballistic for all launch dates. This
    is consistent with the findings in Ref. 15" (McConaghy 2002 et al).

    M7 canonical-signature matching tolerances should be wide enough
    (~0.5 km/s on V_inf, ~10 d on ToF) to collapse these two entries
    under one signature. The leg-descriptor "g(1.4612,526.02,Ll)
    G(2.8096,651.46,U)" — generic return Ll patched with generic return
    U — is the unique structural fingerprint.

    Russell's Chapter 5 parent-cycler list (Table 5.5, line 7512) gives
    a 7-cycle realistic-ephemeris optimisation result for #83 4.991gG2:
    launch Jun-25, total delta-V = 0 m/s, avg E-M transit 165 d, avg
    V_inf E = 5.37, avg V_inf M = 5.48 km/s. These are different again
    from both the McConaghy 2006 abstract values and the Table 4.9
    simple-model values — they characterise the ephemeris-optimal
    trajectory, not the simple-model parent.
