    is an inertially-fixed heliocentric ellipse resonant with both Earth's and
    Mars's orbital periods. Unlike the Aldrin cycler, no gravity-assist flybys
    are needed to maintain its geometry. Per the spaceflighthistory.blogspot
    summary of Niehoff 1985: "A spacecraft in a VISIT-1 orbit would circle the
    Sun in 1.25 Earth years, encountering Earth four times in five Earth years
    and Mars three times in two Mars years."

