    "vinf_kms_at_encounters.1.vinf_kms": "DERIVED (#390): planetocentric V_inf 15.167 km/s from NAIF SPK vgr1_sat337.bsp (Voyager 1, body -31) at Saturn closest approach 1980-11-12T23:46 UTC (outer-window std 0.030 km/s); CA 3.06 R_S (high-energy Titan-targeted approach)."
