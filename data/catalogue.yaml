      caveat that the validity_window assumes June 21 DOY (not all DOYs).
    * orbit_class=quasi_cycler is the v4.7 admission slot for "closes-
      up-to-rotation, epoch-locked, 3-15 returns inside a planetary-
      alignment window".
    * n_returns=10 reflects #330's 10-cycle convergence at all 10 Lambert
      cycles + #331's V3 reproduction over the same 10 cycles + #338's
      verdict at n_cycles=3 (a conservative subset).

    This row's mission-utility implication: a spacecraft launched at the
    indicated launch_epoch (or any June 21 within the validity_window),
    arriving at Umbriel at V_inf=0.92 km/s, can complete ~10 Umbriel-
    Oberon-Umbriel cycles before bounded drift accumulates beyond
    ~530,000 km (smaller than Oberon's orbit radius). Useful for repeat-
    observation orbital science of both Umbriel and Oberon without
    requiring continuous maintenance Delta-V.

