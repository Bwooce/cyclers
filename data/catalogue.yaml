    cycle) and leg class (multi-rev Lambert legs used as phase-reshaping
    reservoirs) lie OUTSIDE our Phase-6 swept genome (single-ellipse zero-rev
    free-return loops); it does not contradict the Jovian EMPTY-region registry
    verdicts, which remain valid as conditioned (mining note §6).
