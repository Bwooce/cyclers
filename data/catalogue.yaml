    "legs[0].tof_days": "Russell 2004 dissertation Table 3.9 row 5.1.1.-7: Earth->Mars (or aphelion) Time (days) = 229."
    aphelion_au: "Russell 2004 dissertation Table 3.9 row 5.1.1.-7: Aphelion Ratio = 1.04 (Russell's ratio to Mars sma 1.524 AU); aphelion = 1.04 x 1.524 AU = 1.585 AU."
    "period.years": "5 x Earth-Mars synodic 2.135 yr = 10.675 yr; spec.md §9 convention."

