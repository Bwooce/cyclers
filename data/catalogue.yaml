    ref_frame: "ECLIPJ2000"   # OCM REF_FRAME
    time_system: null         # idealized circular-coplanar — epoch-free family
    epoch_tzero: null         # OCM EPOCH_TZERO; null = epoch-free
    segments:                 # === OCM TRAJ ===
      - id: "out-em"
        from: "E"
        to: "M"
        traj_type: "keplerian-arc"
        tof_days: 150
        n_revs: 0
        branch: "single"
        a_au: null              # per-segment elements not tabulated — see data_gaps[]
        e: null
        note: 'Russell 2004 Table 4.9 row 1: t_out = 150 days. Designated leg is the second one G(2.8096,651.46,U) per Russell''s convention (uppercase = leg used to compute Mars v_inf and t_out).'
      - id: "ret-me"
        from: "M"
        to: "E"
        traj_type: "keplerian-arc"
        tof_days: 150
        n_revs: 0
        branch: "single"
        a_au: null              # per-segment elements not tabulated — see data_gaps[]
        e: null
        note: 'Russell 2004 Table 4.9 row 1: t_in = 150 days (symmetric). Generic-return arcs are symmetric, so t_in = t_out always for this row.'
      - id: "loop-ee"
        from: "E"
        to: "E"
        traj_type: "keplerian-arc"
        tof_days: null          # intermediate Earth-Earth multi-rev loop — see data_gaps[]
