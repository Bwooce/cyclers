    source_hint: "task #54 multi-rev Lambert solver"
    todo_ref: "#54"
  - path: "trajectory.segments"
    kind: "uncertain"
    note: "Segment topology is provisional AND the current 3-segment E->M / M->E / E-loop skeleton is structurally wrong: it posits a direct Mars->Earth leg that the S1L1 nomenclature does not define. Correct model: outbound E->M (~154 d) with a ballistic Mars flyby, then the S1 (short) and L1 (long) Earth-to-Earth resonant intervals carry the vehicle back to its next Earth flyby to repeat. Re-derive the S1/L1 interval ToF / n_revs / branch from the in-house multi-rev Lambert solver constrained to the published 5.65/3.05 km/s V-infinity; do not invent interval day-counts. probe work showed the naive 3-leg fixed-154-d structure does not close ballistically, consistent with the mismodelled return leg."
