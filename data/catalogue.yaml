      tof_days: 7
      n_revs:
      branch:
      a_au:                     # heliocentric (a,e) do not apply to a geocentric CR3BP arc
      e:
      note: "Earth-to-Earth encounter cadence: \"close-Earth encounters every 7 or 10 days\" per the NTRS abstract. The 7 / 10 d alternation is a feature of the 3-petal geometry with solar-gravity phasing. "
    - id: "petal-emoon-1"
      from: "E"
      to: "Moon"
      traj_type: "cartesian-state"     # CR3BP arc; not a Keplerian conic
      tof_days: 26
      n_revs:
      branch:
      a_au:                     # heliocentric (a,e) do not apply to a geocentric CR3BP arc
      e:
      note: "Earth-Moon encounter cadence: \"Lunar encounters occur every 26 days\" per the NTRS abstract. "
    maneuvers:                # === OCM MAN === lunar/Earth encounters (CR3BP, no patched-conic turn angle)
    - at_segment_boundary:
      body: "Moon"
      type: "flyby-ballistic"
      dv_kms:
      turning_angle_deg:        # CR3BP model — patched-conic turn angle not defined; paper publishes none
      periapsis_alt_km: 3000     # SOURCED: Genova & Aldrin 2015 p.3 (3,000 km perilune, lunar farside). Carried from flyby_mechanics[].
      note: "Lunar encounter (~26-day cadence). periapsis_alt_km is the sourced perilune altitude; CR3BP turn angle undefined."
    - at_segment_boundary:
      body: "E"
      type: "flyby-ballistic"
      dv_kms:
      turning_angle_deg:        # CR3BP model — patched-conic turn angle not defined
      periapsis_alt_km: 3000     # SOURCED: Genova & Aldrin 2015 p.3 (3,000 km perigee per Earth encounter). Carried from flyby_mechanics[].
      note: "Earth encounter (~7/10-day cadence). periapsis_alt_km is the sourced perigee altitude; CR3BP turn angle undefined."
      # --- Per-cycle station-keeping maneuvers (SOURCED 2026-06-10, #184; Genova & Aldrin 2015 p.3). ---
      # These are the bicircular-model maintenance burns that keep the 3-petal cycler; nominal total
      # ~35 m/s/cycle (13+14+8), varying 20-62 m/s/cycle under solar perturbation (p.4), avg 39 m/s/month
      # (abstract p.1). Reference run: TLI 2019-07-12, first lunar flyby 2019-07-15 (Figs. 4-5).
    - at_segment_boundary:
      body: "E"
      type: "station-keeping"
      dv_kms: 0.013              # SOURCED p.3: 13 m/s at perigee (Fig. 3 point C) — enables Moon phasing; yields ~9.5-d Earth holding orbits.
      turning_angle_deg:
      periapsis_alt_km: 3000
      note: "MAN-C: Moon-phasing burn at perigee (Genova & Aldrin 2015 p.3, Fig. 3 C)."
    - at_segment_boundary:
      body: "E"
      type: "station-keeping"
      dv_kms: 0.014              # SOURCED p.3: 14 m/s at perigee (Fig. 3 point E) — increases apogee back to true lunar distance.
      turning_angle_deg:
      periapsis_alt_km: 3000
      note: "MAN-E: apogee-restore burn at perigee (Genova & Aldrin 2015 p.3, Fig. 3 E)."
    - at_segment_boundary:
      body: "E"
      type: "station-keeping"
      dv_kms: 0.008              # SOURCED p.3: 8 m/s, 0.5 d after MAN-E — corrects out-of-plane drift from solar perturbation.
      turning_angle_deg:
      periapsis_alt_km:
      note: "MAN-OOP: out-of-plane correction 0.5 d after MAN-E (Genova & Aldrin 2015 p.3)."
