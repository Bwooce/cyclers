  data_gaps:
    - path: "trajectory.segments"
      kind: "uncertain"
      note: "Loop-count topology is UNRESOLVED for this row. Russell's required-geocentric-turn column lists 5 Earth flybys [81,81,81,81,24], which by the n_flybys-1 heuristic implies 4 intermediate Earth-Earth loops; but Table 3.8 cumulative epochs (Earth 0 / Mars 191 / Earth 1109 / Earth 1474 / Earth 1657 / Earth 2022 / Mars 3131) cleanly resolve only 3 Earth-Earth loops (1109->1474=365, 1474->1657=183, 1657->2022=365). The trailing leg Earth t=2022 -> Mars t=3131 (1109 d) is an Earth->Mars transfer, NOT an Earth-Earth loop: it is either the second-cycle out-em (but its 1109 d != the 191 d first-cycle out-em, so it does not phase-match) or it conceals a further unflagged encounter/loop. The 4th tabulated 81-deg flyby (encounter 6, t=2022) and the 24-deg closure flyby are consistent with either reading. Materialised here as the 3 Table-3.8-sourced loops (loop-ee-1/2/3); the 4th-loop assumption is NOT confirmed and the 1109-d leg's role needs the multi-rev Lambert solver / a topology re-check."
