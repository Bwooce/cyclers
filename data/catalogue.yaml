      https://docs.lib.purdue.edu/dissertations/AAI3166673/ confirms
      title "Design and optimization of interplanetary spacecraft
      trajectories", author Thomas Troy McConaghy. Per the e-Pubs
      abstract (retrieved via Google search snippet): "describes
      advances in methods to design and optimize interplanetary
      spacecraft trajectories, particularly for missions using gravity-
      assist maneuvers or low-thrust engines (or both). The first part
      of the dissertation describes a new, efficient, two-step
      methodology to design and optimize low-thrust gravity-assist
      trajectories ... a 3.7-year Earth-Venus-Earth-Mars-Jupiter flyby
      trajectory with maximized final mass." The Earth-Mars cycler
      taxonomy is treated in the second half of the dissertation.
