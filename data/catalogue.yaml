# Seed catalogue of published cyclers.
#
# Shape: each entry is a subset of the signature_fields described in
# docs/spec.md §16.1, plus full source attribution. Future milestones
# (M3 golden tests, M7 novelty matching) consume this file; until then no
# loader exists.
#
# CRITICAL RULES (mirrored in docs/known-cyclers.md):
# - Every numerical value MUST appear in `source_quotes:` with a verbatim or
#   paraphrased quote citing a section/table/page, OR be `null` with the gap
#   explained in `notes:`. No bare numbers without provenance.
# - `priority_date` is the earliest published date for the cycler; attribution
#   per spec §16.4 always goes to the earliest source.
# - Tolerances and binning per spec §16.2 are applied by the matcher, NOT
#   baked in here; numerical values are reported as published.
# - For multi-source literature entries the citation in `first_published`
#   is the *earliest* one; corroborating later sources go in `notes:` and
#   `corroborating_sources:`.

# ---------------------------------------------------------------------------
# 1. Aldrin classic Earth-Mars cycler (1-synodic)
# ---------------------------------------------------------------------------
- id: aldrin-classic-em-k1-outbound
  name: "Aldrin classic Earth-Mars cycler (outbound / up-escalator, 1 synodic)"
  source: literature
  trajectory_regime: powered   # reclassified 2026-06-01 (task #70): powered in the idealized model - McConaghy 2002 Table 4 / dissertation shows the 1L1 EARTH (geocentric) flyby cannot supply the required ~84 deg turn (max ~72 deg at a 200 km Earth flyby). regime = ballistic/powered in the idealized model (the literature-attested property); NOT derived from our computed DV. See notes + maintenance_dv_kms_per_synodic + flyby_mechanics.
  model_assumption: circular-coplanar   # schema v2 (2026-06-01); circular-coplanar | analytic-ephemeris | cr3bp; see data/README.md
  cycler_class: single-ellipse   # schema v4 (2026-06-03); single-ellipse | multi-arc | non-keplerian; see docs/notes/multi-arc-classification.md
  delta_v_kms: null   # schema v2; near-ballistic / not-extracted — actual value deferred (per-row Russell ΔV extraction)
  maintenance_dv_kms_per_synodic: 1.52   # schema v3 (2026-06-01); COMPUTED output (NOT source-attested), single-impulse turn-deficit surrogate from the sourced a=1.60/e=0.393 + 200 km Earth flyby (~84.7 deg required vs ~71.4 deg achievable). Over-estimates the optimal cost. NEVER a golden-test target; the SOURCED, golden side is the turn angles only (see trajectory.maneuvers[E]).
  v_infinity_leveraging_dv_kms: null   # schema v2; non-null only for Rogers 2012 establishment variants once their values are extracted
  fleet_size: null   # schema v2; integer count; null where not stated by source
  flyby_mechanics: null   # schema v2; per-encounter turning_angle_deg + min_altitude_km; null = not yet extracted from source
  bodies: ["E", "M"]
  sequence_canonical: "E-M"   # cyclic-canonical per spec §16.2; one Earth + one Mars encounter per synodic
  sense: "outbound"            # "up escalator": short Earth->Mars leg, long Mars->Earth return
  period:
    pair: "E-M"
    k: 1
    years: 2.135
    note: "Cycler period = 1 Earth-Mars synodic period; 2.135 yr is the synodic value used throughout this catalogue (see spec §9). Wikipedia/Hollister tables sometimes quote 2.02 yr for the Aldrin cycler — that is the orbital period of the heliocentric ellipse, NOT the cycler repeat period; the cycler still re-encounters Earth at the synodic cadence via the gravity assist."
  vinf_kms_at_encounters:
    - body: "E"
      vinf_kms: 6.5
      note: "Russell 2004 dissertation Table 3.4, cycler 1.0.1.-1 (footnoted as the Aldrin cycler). Rogers/Hughes/Longuski/Aldrin 2012 Table 4 reports V_inf,flyby ranging 5.51-6.55 km/s in the analytic ephemeris model for the 4:3(2)- and 3:2(1)- Aldrin trajectories."
    - body: "M"
      vinf_kms: 9.7
      note: "Russell 2004 dissertation Table 3.4, cycler 1.0.1.-1 (Aldrin). This is the heliocentric V_inf at Mars in the simplified circular-coplanar model; the Aldrin geometry sacrifices V_inf at Mars to keep V_inf at Earth low and the E->M transit short (146 d)."
  orbit_elements:
    a_au: 1.60
    e: 0.393
    perihelion_au: 0.97
    aphelion_au: 2.23
    inclination_deg: 0.0
    note: "Values per Rogers/Hughes/Longuski/Aldrin 2012 Table 1, attributed there to the Aldrin cycler. Spec.md §9 quotes a≈1.659, e≈0.41, peri≈0.98, apo≈2.34 — those are also literature-cited but appear to come from a different rounding/source convention (possibly an early SAIC presentation or the original Aldrin 1985 talk). See docs/known-cyclers.md 'Outstanding questions' for the discrepancy. M3 test tolerances (±0.01 AU on a, ±0.02 on e) absorb both numbers."
    periapse_km: null         # schema v2; parallel to perihelion_au for non-Sun primaries; null if not tabulated
    apoapse_km: null          # schema v2; parallel to aphelion_au for non-Sun primaries
    raan_deg: null            # schema v2; right ascension of ascending node (Ω); null for current entries
    arg_periapsis_deg: null   # schema v2; argument of periapsis (ω); null for current entries
    true_anomaly_deg: null    # schema v2; true anomaly at epoch (ν); null for current entries
    epoch_iso8601: null       # schema v2; ISO-8601 epoch for the anomaly; null = generic
  # Schema v3 (2026-06-01): migrated from flat legs[] to OCM-aligned trajectory{}
  # per the §16.6.5 backfill (task #66). This entry migrates losslessly: the
  # 1-synodic E-M cycle has exactly 2 encounters (1 Earth + 1 Mars), both legs
  # are source-attested with tof_days, and the single Aldrin ellipse (a=1.60,
  # e=0.393) applies to both arcs — so no data_gaps[] are needed.
  trajectory:
    center: "Sun"             # OCM CENTER_NAME (== top-level primary)
    ref_frame: "ECLIPJ2000"   # OCM REF_FRAME
    time_system: null         # idealized circular-coplanar — epoch-free family
    epoch_tzero: null         # OCM EPOCH_TZERO; null = epoch-free
    segments:                 # === OCM TRAJ ===
      - id: "out-em"
        from: "E"
        to: "M"
        traj_type: "keplerian-arc"
        tof_days: 146
        n_revs: 0
        branch: "single"
        a_au: 1.60
        e: 0.393
        note: "Earth->Mars outbound transit. Confirmed in multiple sources: Wikipedia (citing McConaghy/Longuski/Byrnes 2002 p. 6), Rogers et al. 2012 (Table 4 STOUR ephemeris ToF: 161-172 d depending on K:L(M) variant — the 146-d value is the circular-coplanar idealization). a/e are the single Aldrin heliocentric ellipse shared by both legs."
      - id: "ret-me"
        from: "M"
        to: "E"
        traj_type: "keplerian-arc"
        tof_days: 634
        n_revs: 0
        branch: "single"
        a_au: 1.60
        e: 0.393
        note: "REVIEW FIX (2026-05-31): Corrected from 519. The residual arithmetic in the previous draft was flawed. T_cycler (779.8 days) - outbound tof (146 days) = 633.8 days. The cycler completes the remainder of its 2.135-year period on this return leg without breaking into sub-legs, so 634 days is the correct aggregate return ToF for the 1-synodic Aldrin in the simplified model. Both legs trace arcs of the same a=1.60/e=0.393 ellipse."
    maneuvers:                # === OCM MAN ===
      - at_segment_boundary: ["out-em", "ret-me"]
        body: "M"
        type: "flyby-ballistic"
        dv_kms: null
        turning_angle_deg: null
        max_turning_angle_deg: 12.6   # COMPUTED achievable ballistic turn = degrees(max_bend(mu_M, R_M+300 km, vinf=9.7 km/s)); vinf sourced from vinf_kms_at_encounters; alt=generic 300 km safe default. Not source-attested.
        periapsis_alt_km: null
        note: "Mars flyby closing the outbound->return transition; V-infinity continuity (9.7 km/s) is the cycle constraint at Mars. dv_kms null mirrors the v2 delta_v_kms (Russell classes this under the wider near-ballistic net, AR=1.47/TR=0.86)."
      - at_segment_boundary: ["ret-me", "out-em"]
        body: "E"
        type: "flyby-powered"
        dv_kms: null
        turning_angle_deg: 84.7   # SOURCED geometry: geocentric turn REQUIRED to close the 1-synodic cycle, computed from the sourced a=1.60/e=0.393 (McConaghy 2002 Table 4 / dissertation report ~84 deg). This is the binding powered flyby (not Mars).
        max_turning_angle_deg: 71.4   # COMPUTED achievable turn at periapsis_alt_km below; McConaghy bases the ~72 deg max on a 200 km Earth flyby (TRMIN=0.85 = 72/84.7 chosen to include Aldrin). required > max => powered.
        periapsis_alt_km: 200   # SOURCED: McConaghy dissertation bases the max allowable geocentric turn on a "200 km altitude Earth flyby". Configurable per orbit/body; 300 km is the generic safe default elsewhere.
        note: "Earth flyby closing the 1-synodic cycle; V-infinity 6.5 km/s. The required geocentric turn (~84.7 deg) exceeds the max ballistic turn (~71.4 deg at 200 km), so the cycle cannot close ballistically: this is why Aldrin is powered. dv_kms is unpublished (see data_gaps); the computed surrogate is surfaced in maintenance_dv_kms_per_synodic."
  data_gaps:
    - path: "trajectory.maneuvers[E].dv_kms"
      kind: "unknown"
      note: "The classic Aldrin (1L1) maintenance-DV magnitude is NOT published in the primary literature. McConaghy/Longuski/Byrnes 2002 (AIAA 2002-4420, Table 4, row '1L1') characterises the Aldrin cycler by a turn-angle test - required geocentric (EARTH) turn ~84 deg vs max achievable ~72 deg at a 200 km Earth flyby - and explicitly defers DV estimation to future work (p.8: 'An estimate of the total DV required by powered cyclers would also be useful for identifying nearly-ballistic cyclers'). No m/s figure exists in McConaghy 2002, Byrnes 1993, Rogers 2012, or Russell 2004. Our M6b/M7 ephemeris optimiser computes a maintenance-DV value; that value is OUR computation, not source-attested - flagged as such in maintenance_dv_kms_per_synodic."
      source_hint: "McConaghy/Longuski/Byrnes 2002 AIAA 2002-4420 Table 4 + dissertation (geocentric turn 84/72 deg, 200 km Earth flyby, TRMIN=0.85); DV magnitude deferred p.8"
      todo_ref: "#70"
  first_published:
    authors: ["Aldrin, B."]
    year: 1985
    title: "Cyclic Trajectory Concepts"
    venue: "SAIC presentation to the Interplanetary Rapid Transit Study Meeting, JPL"
    date: "1985-10-28"
    doi: null
    url: null
    note: "The original presentation is not online; citation per Rogers et al. 2012 ref [8] and Russell 2004 dissertation ref [13]. The first peer-reviewed elaboration is Byrnes/Longuski/Aldrin 1993 (DOI 10.2514/3.25519, see corroborating_sources)."
  corroborating_sources:
    - authors: ["Byrnes, D. V.", "Longuski, J. M.", "Aldrin, B."]
      year: 1993
      title: "Cycler Orbit Between Earth and Mars"
      venue: "Journal of Spacecraft and Rockets, Vol. 30, No. 3, pp. 334-336"
      doi: "10.2514/3.25519"
      url: "https://ui.adsabs.harvard.edu/abs/1993JSpRo..30..334B/abstract"
    - authors: ["Friedlander, A. L.", "Niehoff, J. C.", "Byrnes, D. V.", "Longuski, J. M."]
      year: 1986
      title: "Circulating Transportation Orbits Between Earth and Mars"
      venue: "AIAA/AAS Astrodynamics Conference, Williamsburg VA, AIAA 86-2009-CP"
      doi: "10.2514/6.1986-2009"
      url: "https://doi.org/10.2514/6.1986-2009"
    - authors: ["Rogers, B. A.", "Hughes, K. M.", "Longuski, J. M.", "Aldrin, B."]
      year: 2012
      title: "Preliminary Analysis of Establishing Cycler Trajectories Between Earth and Mars via V-Infinity Leveraging"
      venue: "AIAA/AAS Astrodynamics Specialist Conference, Minneapolis MN, AIAA 2012-4746"
      doi: "10.2514/6.2012-4746"
      url: "https://engineering.purdue.edu/AAC/wp-content/uploads/2012/09/EstablishingCyclerTrajectoriesBetweenEarthAndMarsViaV-InfinityLeveraging-AIAA-2012-47461.pdf"
    - authors: ["Russell, R. P."]
      year: 2004
      title: "Global Search and Optimization for Free-Return Earth-Mars Cyclers"
      venue: "Ph.D. dissertation, University of Texas at Austin, Department of Aerospace Engineering"
      doi: null
      url: "http://hdl.handle.net/2152/1253"
      note: "Russell's dissertation Table 3.4 lists the Aldrin cycler as 'cycler 1.0.1.-1' with V_inf 6.5 (Earth), 9.7 (Mars), E->M time 146 d, Aphelion Ratio 1.47 (=> aphelion 1.47 x 1.52 AU = 2.23 AU)."
  priority_date: "1985-10-28"
  notes: |
    The "outbound" / "up escalator" branch. Aldrin's original concept includes
    a complementary "inbound" / "down escalator" cycler that is the time-mirror
    image (short Mars->Earth, long Earth->Mars). Per Russell 2004 dissertation
    section 3.8: "Due to symmetry, the energy properties for inbound and
    outbound cyclers are identical." The inbound cycler is separately catalogued
    as `aldrin-classic-em-k1-inbound` so the search validates both directional
    geometries; M7 will collapse them under one identity at the matching stage
    via signature canonicalisation.

    Russell 2004 dissertation section 3.8 footnote 'c' explicitly identifies
    cycler 1.0.1.-1 in Table 3.4 as "Aldrin cycler". This is the only entry
    in the dissertation explicitly labelled Aldrin.

    Spec §9 anchor values (a≈1.659, e≈0.41, peri≈0.98, apo≈2.34, E->M 146 d)
    vs. the Rogers 2012 / Russell 2004 / Wikipedia values (a=1.60, e=0.393,
    peri=0.97, apo=2.23, E->M 146 d): the discrepancy is real but the test
    tolerances in docs/phases/m3-model-construct/plan.md §4.3 (TOL_A_AU=0.01,
    TOL_E=0.02, TOL_PERI_AU=0.02, TOL_APO_AU=0.02) are too tight to absorb
    the gap between the two value sets. M3 implementers MUST reconcile this
    before the gate test passes — either widen tolerances or pick the value
    set that matches the construction the code actually produces from the
    M1 circular-coplanar ephemeris (which uses sma_E=1.00000261, sma_M=1.52371034).
    See docs/known-cyclers.md "Outstanding questions" §A.

    Russell 2004 Table 3.4 classifies this cycler under the wider
    ARMIN=0.9 / TRMIN=0.85 "ballistic" net rather than the strict
    AR>=1.0 AND TR>=1.0 criterion (AR=1.47, TR=0.86). That is Russell's
    *family-grouping* net, not a claim of true ballistic closure. The
    decisive test is McConaghy 2002 Table 4 / the dissertation: the 1L1
    EARTH (geocentric) flyby requires a ~84 deg turn against a ~72 deg
    maximum (at a 200 km Earth flyby; TRMIN=0.85 = 72/84.7 is chosen to
    include Aldrin), so the cycler cannot close ballistically even in the
    idealized circular-coplanar model. We
    therefore set `trajectory_regime: powered` (reclassified 2026-06-01,
    task #70). The regime is the *idealized-model* property attested by
    the literature; it is NOT set from any DV we compute. The magnitude of
    the maintenance burn is unpublished (see data_gaps) and is surfaced
    separately as the COMPUTED, non-source-attested
    `maintenance_dv_kms_per_synodic`.
  source_quotes:
    a_au: |
      Rogers et al. 2012, Table 1 'Orbital elements and number of vehicles for selected
      cycler trajectories': "Aldrin Cycler ... Semi-Major Axis, AU: 1.60". Same value
      derivable from Russell 2004 Table 3.4 (Aldrin = cycler 1.0.1.-1) via Aphelion
      Ratio 1.47 and the geometry.
    e: |
      Rogers et al. 2012, Table 1: "Aldrin Cycler ... Eccentricity: 0.393". Consistent
      with Wikipedia's quotation of the same value, attributed there to
      "Byrnes, Longuski & Aldrin 1993, pp. 334-335" [9].
    perihelion_au: |
      Rogers et al. 2012, Table 1: "Aldrin Cycler ... Perihelion Radius, AU: 0.97".
    aphelion_au: |
      Rogers et al. 2012, Table 1: "Aldrin Cycler ... Aphelion Radius, AU: 2.23".
      Russell 2004 Table 3.4 lists Aphelion Ratio 1.47 for cycler 1.0.1.-1, giving
      aphelion = 1.47 x 1.52 AU = 2.23 AU.
    inclination_deg: |
      Inclination 0 is the modelling assumption (circular-coplanar) used in the
      original Aldrin 1985 derivation and all subsequent reproductions in §9 of
      Russell 2004 and §III.A of Rogers 2012. Real-ephemeris versions (Rogers
      2012 Table 4 STOUR results) inherit Mars' ~1.85° inclination; that is an
      M6 concern, not M3.
    "vinf_kms_at_encounters[0].vinf_kms": |
      Russell 2004 Table 3.4 row for cycler 1.0.1.-1: "Earth v_inf (km/s): 6.5".
    "vinf_kms_at_encounters[1].vinf_kms": |
      Russell 2004 Table 3.4 row for cycler 1.0.1.-1: "Mars v_inf (km/s): 9.7".
    "legs[0].tof_days": |
      Russell 2004 Table 3.4 row for cycler 1.0.1.-1: "Earth->Mars Time (days): 146".
      Also Wikipedia 'Mars cycler': "travels from Earth to Mars in 146 days
      (4.8 months)" citing McConaghy/Longuski/Byrnes 2002 p. 6 [5].
    "legs[1].tof_days": |
      Derived mathematically from synodic period minus outbound transit time:
      T_cycler (≈779.8 d) − tof_E→M (146 d) = 633.8 d ≈ 634 d. See leg note for
      the 2026-05-31 review fix that replaced the previously published 519 d.
    "period.years": |
      "Earth-Mars synodic 2.135 yr" — spec.md §9; also used as the Aldrin cycler
      repeat in Wikipedia and McConaghy/Longuski/Byrnes 2002 p. 6.

# ---------------------------------------------------------------------------
# 2. McConaghy / Landau / Yam / Longuski 2006 — Two-synodic-period E-M cycler
# ---------------------------------------------------------------------------
- id: mcconaghy-2006-em-k2
  name: "McConaghy/Landau/Yam/Longuski two-synodic-period Earth-Mars cycler"
  source: literature
  trajectory_regime: ballistic   # added 2026-06-01; v1 catalogue is ballistic-only; field is explicit for future regime expansion
  model_assumption: circular-coplanar   # schema v2 (2026-06-01); circular-coplanar | analytic-ephemeris | cr3bp; see data/README.md
  cycler_class: multi-arc   # schema v4 (2026-06-03); single-ellipse | multi-arc | non-keplerian; see docs/notes/multi-arc-classification.md
  invariants:   # schema v4 (2026-06-03); cycle-level identity for multi-arc cyclers; see docs/spec.md §16.7.4
    aphelion_ratio: null   # not tabulated in this Russell source — see data_gaps[]
    transit_times_days: [153, 153]   # [outbound E->M, return M->E] transit times in days; sourced from trajectory.segments
    turn_ratio: 2.65   # Russell 2004: required turn angle / max ballistic turn (TR >= 1 => strictly ballistic)
  free_return_arcs:   # schema v4.1 (spec §16.7.7); Russell Earth-to-Earth free-return arc descriptors
    - arc_type: generic
      resonance: null
      tof_years: 1.4612
      raw_descriptor: "g(1.4612,526.02,Ll)"
    - arc_type: generic
      resonance: null
      tof_years: 2.8096
      raw_descriptor: "G(2.8096,651.46,U)"
  delta_v_kms: null   # schema v2; near-ballistic / not-extracted — actual value deferred (per-row Russell ΔV extraction)
  v_infinity_leveraging_dv_kms: null   # schema v2; non-null only for Rogers 2012 establishment variants once their values are extracted
  fleet_size: null   # schema v2; integer count; null where not stated by source
  flyby_mechanics: null   # schema v2; per-encounter turning_angle_deg + min_altitude_km; null = not yet extracted from source
  bodies: ["E", "M"]
  sequence_canonical: "E-E-M-M"   # 2 Earth encounters + 2 Mars encounters per cycle (one Earth = intermediate)
  sense: "outbound"
  period:
    pair: "E-M"
    k: 2
    years: 4.27
    note: "Two Earth-Mars synodic periods = 2 x 2.135 yr = 4.27 yr."
  vinf_kms_at_encounters:
    - body: "E"
      vinf_kms: 4.7
      note: "From the McConaghy 2006 abstract: 'arrival V-infinity magnitudes of 4.7 km/s at Earth and 5.0 km/s at Mars' (circular-coplanar model)."
    - body: "M"
      vinf_kms: 5.0
      note: "From the McConaghy 2006 abstract."
  orbit_elements:
    a_au: null
    e: null
    perihelion_au: null
    aphelion_au: 1.64
    inclination_deg: 0.0
    note: |
      Russell 2004 dissertation Table 4.9 row 1 ("4.99 a", footnote a:
      "documented in Ref. 15", i.e. McConaghy 2002 AIAA 2002-4420 — the
      precursor paper that became McConaghy 2006 JSR). Russell's parent-
      cycler list (Table 5.5 and Appendix C) tags row 1 as parent cycler
      4.991gG2 (#83), and Chapter 5 §5.5 explicitly states "cycler
      4.991gG2(#83) ... Also known as the 'S1L1' cycler" (dissertation
      line 7416). The table directly tabulates aphelion = 1.64 AU and
      V_inf at Earth = 4.99 km/s, V_inf at Mars = 5.10 km/s, t_out =
      t_in = 150 days, TR = 2.65.

      Russell does NOT tabulate (a, e, perihelion) directly because the
      cycler is a piecewise sequence of two generic-return arcs, not a
      single Keplerian ellipse — each leg has its own (a, e). Only the
      maximum aphelion is well-defined for the cycler as a whole.
      Therefore a_au, e, perihelion_au remain null; aphelion_au backfilled
      from Russell Table 4.9 row 1.

      The McConaghy 2006 paper itself (DOI 10.2514/1.15215, paywalled
      at AIAA 403) presumably has higher-precision per-leg orbital
      elements but is not directly accessible. The 2-decimal Russell
      values are sufficient for M7 canonical-signature matching.
    periapse_km: null         # schema v2; parallel to perihelion_au for non-Sun primaries; null if not tabulated
    apoapse_km: null          # schema v2; parallel to aphelion_au for non-Sun primaries
    raan_deg: null            # schema v2; right ascension of ascending node (Ω); null for current entries
    arg_periapsis_deg: null   # schema v2; argument of periapsis (ω); null for current entries
    true_anomaly_deg: null    # schema v2; true anomaly at epoch (ν); null for current entries
    epoch_iso8601: null       # schema v2; ISO-8601 epoch for the anomaly; null = generic
  # Schema v3 (2026-06-01): migrated from flat legs[] to OCM-aligned trajectory{}
  # per the §16.6.5 backfill (task #66). The two source-attested 153-d transfer
  # legs (E->M out, M->E return) are populated; the intermediate Earth-Earth
  # loop that gives this 2-synodic cycler its 'L1' and the per-segment (a,e)
  # are known-unknowns tracked in data_gaps[] (orbit_elements.a_au/e are null
  # because the cycler is a piecewise sequence of generic-return arcs, not a
  # single Keplerian ellipse).
  trajectory:
    center: "Sun"             # OCM CENTER_NAME (== top-level primary)
    ref_frame: "ECLIPJ2000"   # OCM REF_FRAME
    time_system: null         # idealized circular-coplanar — epoch-free family
    epoch_tzero: null         # OCM EPOCH_TZERO; null = epoch-free
    segments:                 # === OCM TRAJ ===
      - id: "out-em"
        from: "E"
        to: "M"
        traj_type: "keplerian-arc"
        tof_days: 153
        n_revs: 0
        branch: "single"
        a_au: null              # per-segment elements not tabulated — see data_gaps[]
        e: null
        note: "Earth->Mars transfer time per McConaghy 2006 abstract: '153-day transfer times between Earth and Mars'. Note Rogers et al. 2012 reports 154-day for the S1L1 variant in the establishment-cycler context; the 153-day value is the cycler's nominal."
      - id: "ret-me"
        from: "M"
        to: "E"
        traj_type: "keplerian-arc"
        tof_days: 153
        n_revs: 0
        branch: "single"
        a_au: null              # per-segment elements not tabulated — see data_gaps[]
        e: null
        note: "Symmetric return leg, same ToF. Per the abstract this cycler is symmetric."
      - id: "loop-ee"
        from: "E"
        to: "E"
        traj_type: "keplerian-arc"
        tof_days: null          # the intermediate Earth-Earth multi-rev loop — see data_gaps[]
        n_revs: null
        branch: null
        a_au: null
        e: null
        note: "The single intermediate Earth-Earth loop of this 2-synodic ('L1') cycler; fills the remainder of the 4.27-yr period between the two Mars encounters. Multi-rev arc — tof_days / n_revs / branch / (a,e) to be set by the multi-rev Lambert solver (task #54)."
    maneuvers:                # === OCM MAN ===
      - at_segment_boundary: ["out-em", "ret-me"]
        body: "M"
        type: "flyby-ballistic"
        dv_kms: 0.0
        turning_angle_deg: null
        max_turning_angle_deg: 36.9   # COMPUTED achievable ballistic turn = degrees(max_bend(mu_M, R_M+300 km, vinf=5 km/s)); vinf sourced from vinf_kms_at_encounters; alt=generic 300 km safe default. Not source-attested.
        periapsis_alt_km: null
