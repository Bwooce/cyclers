  source: literature
  trajectory_regime: powered   # reclassified 2026-06-01 (task #70): time-mirror of outbound; powered in the idealized model per McConaghy 2002 Table 4 / dissertation (1L1 EARTH geocentric turn ~84 deg > ~72 deg max at a 200 km Earth flyby). regime = ballistic/powered in the idealized model (literature-attested); NOT derived from our computed DV. See aldrin-classic-em-k1-outbound notes.
  model_assumption: circular-coplanar   # schema v2 (2026-06-01); circular-coplanar | analytic-ephemeris | cr3bp; see data/README.md
  cycler_class: single-ellipse   # schema v4 (2026-06-03); single-ellipse | multi-arc | non-keplerian; see docs/notes/multi-arc-classification.md
  orbit_class: cycler   # schema v4.7 (2026-06-15, task #294); scope expansion default — every pre-v4.7 row is a strict cycler (scripts/migrate_catalogue_scope_2026-06-15.py); see data/README.md
  epoch_locked: false   # schema v4.7 (task #294); strict cyclers are NOT epoch-locked
  n_returns: infinite   # schema v4.7 (task #294); strict cyclers complete an unbounded number of returns
  validation_level: V1   # schema v4.5 (2026-06-06, spec §16.7.12 / §14); #125 Part 1: real-DE440 inbound clears §14 V1 (lamberthub izzo+gooding leg agreement < tol AND Kepler reprop); see data/README.md
  orbit_source: rogers-2012-t1   # schema v4.4 (2026-06-05); provenance tag back-filled from this row's existing source metadata (scripts/backfill_provenance_tags.py); see data/README.md
  orbit_fidelity: circular-coplanar
  vinf_source: russell-2004-t34
  vinf_fidelity: circular-coplanar
  delta_v_kms:        # schema v2; near-ballistic / not-extracted — actual value deferred (per-row Russell ΔV extraction)
  maintenance_dv_kms_per_synodic: 1.52   # schema v3 (2026-06-01); COMPUTED output (NOT source-attested), single-impulse turn-deficit surrogate from the sourced a=1.60/e=0.393 + 200 km Earth flyby (~84.7 deg required vs ~71.4 deg achievable). Over-estimates the optimal cost. NEVER a golden-test target; the SOURCED, golden side is the turn angles only (see trajectory.maneuvers[E]).
  dv_band: powered_dsm   # schema v4.8 (2026-06-22, task #417); Axis-B real-eph maintenance band (time-mirror of the outbound row). SOURCED: Byrnes-Longuski-Aldrin 1993 ~1.73-2.04 km/s per 15 yr for the Aldrin (1L1) cycler (corroborated Rauwolf 2002; Chen 2002) — above the 300 m/s/7-cycle powered ceiling. NOT derived from the computed maintenance_dv_kms_per_synodic surrogate above. See docs/notes/2026-06-22-dv-band-definitions.md.
  dv_band_source: byrnes-longuski-aldrin-1993   # SOURCED powered-band maintenance ΔV (1.73/2.04 km/s per 15 yr); digest docs/notes/2026-06-17-digest-byrnes-longuski-aldrin-1993.md
  v_infinity_leveraging_dv_kms:        # schema v2; non-null only for Rogers 2012 establishment variants once their values are extracted
  fleet_size:        # schema v2; integer count; null where not stated by source
  flyby_mechanics:        # schema v2; per-encounter turning_angle_deg + min_altitude_km; null = not yet extracted from source
  bodies: ["M", "E"]
  sequence_canonical: "M-E"
  sense: "inbound"            # "down escalator": short Mars->Earth leg, long Earth->Mars return
  period:
    pair: "E-M"
    k: 1
    years: 2.135
  vinf_kms_at_encounters:
  - body: "M"
    vinf_kms: 9.7
    note: "Due to symmetric geometry, the inbound V_inf matches the outbound V_inf. Value from Russell 2004 Table 3.4 for the Aldrin."
  - body: "E"
    vinf_kms: 6.5
    note: "Symmetric with outbound."
  # Schema v3 (2026-06-01): migrated from flat legs[] to OCM-aligned trajectory{}
  # per the §16.6.5 backfill (task #66). Time-mirror of the outbound escalator;
  # migrates losslessly for the same reasons (2 encounters == 2 attested legs,
  # single Aldrin ellipse a=1.60/e=0.393). No data_gaps[] needed.
  trajectory:
    center: "Sun"             # OCM CENTER_NAME (== top-level primary)
    ref_frame: "ECLIPJ2000"   # OCM REF_FRAME
    time_system:              # idealized circular-coplanar — epoch-free family
    epoch_tzero:              # OCM EPOCH_TZERO; null = epoch-free
    segments:                 # === OCM TRAJ ===
    - id: "in-me"
      from: "M"
      to: "E"
      traj_type: "keplerian-arc"
      tof_days: 146
      n_revs: 0
      branch: "single"
      a_au: 1.60
      e: 0.393
      note: "Mars->Earth inbound transit. Symmetric to the outbound leg. a/e are the single Aldrin heliocentric ellipse shared by both legs."
    - id: "ret-em"
      from: "E"
      to: "M"
      traj_type: "keplerian-arc"
      tof_days: 634
      n_revs: 0
      branch: "single"
      a_au: 1.60
      e: 0.393
      note: "Derived mathematically: T_cycler (780 d) - inbound transit (146 d) = 634 d. Both legs trace arcs of the same a=1.60/e=0.393 ellipse."
    maneuvers:                # === OCM MAN ===
    - at_segment_boundary: ["in-me", "ret-em"]
      body: "E"
      type: "flyby-powered"
      dv_kms:
      turning_angle_deg: 84.7     # SOURCED geometry (geocentric turn required), from a=1.60/e=0.393; the binding powered flyby (time-mirror of outbound).
      max_turning_angle_deg: 71.4     # COMPUTED achievable turn at the 200 km Earth flyby below (McConaghy ~72 deg, TRMIN=0.85). required > max => powered.
      periapsis_alt_km: 200     # SOURCED: McConaghy dissertation 200 km Earth flyby. Configurable per orbit/body.
      note: "Earth flyby closing the inbound->return transition; V-infinity 6.5 km/s (symmetric with outbound). Required geocentric turn ~84.7 deg > ~71.4 deg achievable => powered. dv_kms unpublished (data_gaps); computed surrogate in maintenance_dv_kms_per_synodic."
    - at_segment_boundary: ["ret-em", "in-me"]
      body: "M"
      type: "flyby-ballistic"
      dv_kms:
      turning_angle_deg:
      max_turning_angle_deg: 12.6     # COMPUTED achievable ballistic turn = degrees(max_bend(mu_M, R_M+300 km, vinf=9.7 km/s)); vinf sourced from vinf_kms_at_encounters; alt=generic 300 km safe default. Not source-attested.
      periapsis_alt_km:
      note: "Mars flyby closing the 1-synodic cycle; V-infinity 9.7 km/s (symmetric with outbound)."
  data_gaps:
  - path: "trajectory.maneuvers[E].dv_kms"
    kind: "unknown"
    note: "Same as aldrin-classic-em-k1-outbound: the classic Aldrin (1L1) maintenance-DV magnitude is NOT published. McConaghy 2002 (AIAA 2002-4420, Table 4 row '1L1') gives a turn-angle test (required ~84 deg > max ~72 deg at the EARTH geocentric flyby, 200 km altitude) and defers DV estimation to future work (p.8). Inbound is the time-mirror of outbound and shares the same gap."
    source_hint: "McConaghy/Longuski/Byrnes 2002 AIAA 2002-4420 Table 4 + dissertation (geocentric 84/72 deg, 200 km Earth flyby); DV magnitude deferred p.8"
    todo_ref: "#70"
  first_published:
    authors: ["Aldrin, B."]
    year: 1985
    title: "Cyclic Trajectory Concepts"
    venue: "SAIC presentation to the Interplanetary Rapid Transit Study Meeting, JPL"
    date: "1985-10-28"
    doi:
    url:
  priority_date: "1985-10-28"
  notes: |
    The "inbound" / "down escalator" branch. Time-mirror image of
    `aldrin-classic-em-k1-outbound`. While M7 novelty matching will likely
    collapse this under the same primary identity as the outbound, it is
    given a dedicated seed so the search algorithm validates both
    directional geometries explicitly.
  source_quotes:
    "vinf_kms_at_encounters[0].vinf_kms": "Russell 2004 dissertation §3.8: 'Due to symmetry, the energy properties for inbound and outbound cyclers are identical.'"
    "vinf_kms_at_encounters[1].vinf_kms": "Russell 2004 dissertation §3.8 (same as above)."
    "legs[0].tof_days": "Wikipedia / McConaghy 2002: symmetric 146-day fast transit."
    "period.years": "Earth-Mars synodic 2.135 yr — spec.md §9."

