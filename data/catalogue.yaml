    years: 4.27
  vinf_kms_at_encounters:
  - body: "E"
    vinf_kms: 5.65
    note: "Per spec.md §9 and corroborating sources, the S1L1 ballistic two-synodic-period cycler has 'low V-infinity at Earth and Mars (5.65 and 3.05 km/s, respectively)'. This is the spec-anchored M5 milestone value. PROVENANCE (updated #384, 2026-06-19): the spec-9 value is now CORROBORATED as within the published real-ephemeris envelope of Byrnes-McConaghy-Longuski 2002 ('Analysis of Various Two Synodic Period Earth-Mars Cycler Trajectories', AIAA/AAS Monterey Aug 2002) — its Case-3 (S1L1-B near-twin) real-eph table spans Earth v∞ 4.15–7.44 km/s, which CONTAINS 5.65. The McConaghy S1L1-B literal pair is 4.7 km/s (the resonant near-twin). Earlier caveat retained for history: not literal-matched in Patel 2019 (3.657 km/s flyby) / McConaghy 2006; the Byrnes 2002 envelope is the first published source to bracket the spec value. See data_gaps[] entry."
  - body: "M"
