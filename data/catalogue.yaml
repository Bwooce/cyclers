# ---------------------------------------------------------------------------
# Braik & Ross 2026 — Common-energy (1,1)a, (1,1)b, (3,2) Earth-Moon cyclers
# (arXiv 2605.31543, "Orbital Networks in the Three-Body Problem", 29 May 2026).
# Three NEW (k1,k2)-cycler family members at the common Jacobi C_J=3.1294 used
# throughout the paper's reachable-set accessibility framework (Sec. 2.4-2.5,
# Table 2). DISTINCT from the existing per-family-stable-midpoint Ross & Roberts-
# Tsoukkas 2025 (AAS 25-621) anchors (ross-rt-em-cycler-11-2025 at C=3.151,
# ross-rt-em-cycler-32-2025 at C=3.183) -- the Braik-Ross members are different
# orbits in the same continuous families at a different energy. The fourth
# Braik-Ross cycler (C21) is already catalogued as ross-rt-em-cycler-21-2025
# (the (2,1) family's full Jacobi extent DeltaC ~ 4e-12 makes it a single point
# in C; 3.1294 is its 5-sig-fig display rounding -- Braik-Ross 2026 added as
# corroborating_sources on that row).
#
# RECOVERY: All three reproduced (#249, commits a19eb24/4a20243/f608c6b/325c8a2)
# by the same fixed-Jacobi symmetric perpendicular-x-axis-crossing corrector that
# adopted the Ross-RT 2025 anchor rows, with the per-family seed regions (x0
# bracket + ydot0 sign + half-period crossing index) pinned in
# src/cyclerfinder/search/reachable_representatives.py::_CYCLER_SEEDS. Period
# matches the Braik-Ross Table-2 sourced figure to 0.001%-0.06%; Jacobi is
# enforced to machine epsilon; topology is (1,1) prograde / (3,2) prograde as
# expected. Independent Radau cross-check closes the Jacobi (dJ < 1e-12) but
# NOT the full state vector at one period for the highly-unstable (3,2) member
# (C32: Floquet ratio |lambda|~2.5e5 over one period -> structural ~7e-6
# rotating-frame closure ceiling from integrator round-off amplification; the
# instability is exactly what Braik-Ross sigma=0.6886 TU^-1 forecasts).
#
# STABILITY: All three are UNSTABLE at the common Jacobi (Braik-Ross Table 2
# instability rate sigma > 0). This is the design feature that makes the
# Braik-Ross framework work: unstable representatives share a common chaotic
# region (Fig. 4) and finite-DeltaV heading-change maneuvers exploit that for
# low-cost connectivity. NOT comparable to the per-family STABLE-midpoint
# Ross-RT 2025 anchors, which are linearly stable (|nu|<1).
#
# VALIDATION LEVEL: V1 -- spec §14 V1 like-for-like in the planar CR3BP (same-
# model corrector reproduction + Jacobi enforced + Barden ny REPRODUCED |nu|>>1
# UNSTABLE verdict matching Braik-Ross sigma>0 + independent Radau Jacobi
# preservation). NOT V2: V2-ballistic requires bounded-drift over >=3 laps,
# which is mechanically impossible for an unstable orbit (the long-span IAS15
# evidence used to upgrade the stable Ross-RT 2025 anchors from V1->V2 in #229
# does not apply here -- exponential growth excluded is exactly NOT what these
# orbits exhibit). State_nd is DERIVED, not a golden.
# ---------------------------------------------------------------------------
