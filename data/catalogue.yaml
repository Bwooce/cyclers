  notes: |
    The "S1L1" name follows the standard Earth-Mars cycler nomenclature
    proposed by McConaghy/Russell/Longuski (Russell 2004 dissertation ref [25]):
    "S" = (number of synodic periods in cycler) preceded by S, "L" = number of
    intermediate Earth-Earth loops, and the trailing 1's encode the leg types.

    This is the cycler the spec §9 M5 milestone references with V_inf =
    "5.65 km/s (E), 3.05 km/s (M)". It is NOT the same as the McConaghy 2006
    "Notable" cycler (which has V_inf 4.7/5.0); both are two-synodic E-M
    cyclers with one intermediate Earth encounter, but they belong to
    different families in the McConaghy/Longuski/Byrnes 2002 (AIAA 2002-4420)
    broad-class taxonomy.

    Rogers et al. 2012 Table 1's S1L1 entry shows (a, e, peri, apo) =
    (1.30, 0.257, 0.97, 1.64) which gives aphelion comfortably inside Mars's
    aphelion of ~1.67 AU only marginally — implying the Mars encounter happens
    near the cycler's aphelion. This matches the low V_inf at Mars (3.05 km/s):
    the cycler "catches up" to Mars near its slowest point in its heliocentric
    motion.
