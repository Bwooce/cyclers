      Aegis Aerospace (Asher). PROVENANCE: this row was originally ingested
      from the NTRS landing-page ABSTRACT only; enriched 2026-06-12 (#211/#216)
      from the FULL IAC-22-C1.6.6 PDF (mining note
      docs/notes/2026-06-11-wittal-2022-iac-mining.md). The earlier
