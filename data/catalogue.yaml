        note: 'Intermediate Earth-Earth loop 1 of 1 for this 2-synodic cycler (sequence E-E-M-M); fills part of the 4.27-yr period between Mars encounters. Multi-rev arc — tof_days / n_revs / branch / (a,e) to be set by the multi-rev Lambert solver (task #54).'
    maneuvers:                # === OCM MAN ===
      - at_segment_boundary: ["out-em", "ret-me"]
        body: "M"
        type: "flyby-ballistic"
        dv_kms: 0.0
        turning_angle_deg: null
        max_turning_angle_deg: 35.9   # COMPUTED achievable ballistic turn = degrees(max_bend(mu_M, R_M+300 km, vinf=5.1 km/s)); vinf sourced from vinf_kms_at_encounters; alt=generic 300 km safe default. Not source-attested.
        periapsis_alt_km: null
        note: "Ballistic Mars flyby; V-infinity continuity (5.1 km/s in == out) is the cycle-closure constraint at Mars."
