      'Case 1, 4:3(2)-, LD 12/14/2024, TOF 365 days, Periapse 0.946 AU,
      Apoapse 1.503 AU' — the 365-day TOF for the first leg of the
      establishment-cycler trajectory that matches the Case 1 cycler
      orbital elements.
    "period.years": |
      Period = k * synodic = 2 * 2.135 yr = 4.27 yr; derived from the
      two-synodic-period family membership confirmed by Rogers 2012 §III.A
      "various two synodic period cyclers".

