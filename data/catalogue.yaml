    FAMILY SEED ENTRY for Russell 2004 dissertation Chapter 4 cycler
    tables. Russell's global search enumerates 202 total ballistic +
    near-ballistic Earth-Mars cyclers with periods up to 3 synodic
    periods (dissertation Table 4.14):

    - Table 4.9 (page 127): 5 ballistic 2-synodic cyclers (4 generic
      transit-leg rows tabulated; the 5 count in Table 4.14 includes
      one variant not tabulated separately). The McConaghy 2006
      "Notable" cycler is row 1 = 4.991gG2 (catalogued individually
      as `russell-ch4-4.991gG2`). The high-energy 8.049gGf2 is row 2.
    - Tables 4.10-4.11 (pages 128-129): 141 ballistic 3-synodic
      cyclers with generic transit legs. Many rows share the same
      (V_inf E, V_inf M, t_out, aphel) parameters and differ only in
      trailing leg phasing arguments (Russell line 5494 calls these
      "subtle differences"). ~37 distinct (V_inf, ToF, aphel) groups.
      6 individually catalogued as `russell-ch4-3.64gGg3`, `-3.77Gh3`,
      `-3.78Gg3`, `-5.30gGf3`, `-5.66Gfh3`, `-9.94Gg3` (the bolded
      promising members per dissertation line 5510).
    - Table 4.12 (page 132): 28 ballistic 3-synodic cyclers with
      full-rev transit legs. Asymmetric inbound/outbound transit
      times. 3 individually catalogued as `russell-ch4-3.66gfF3`,
      `-5.30ggF3`, `-5.75ggF3`. Russell also bolds 3.77ghF (V_inf
      3.77/4.71, t_out=170 t_in=200, aphel 1.63, TR=1.16) which is
      not individually catalogued here.
    - Table 4.13 (page 134): 28 NEAR-ballistic 3-synodic cyclers (TR
      reduced from 1.00 to 0.95). 1 individually catalogued as
      `russell-ch4-6.44Gg3`. The famous Aldrin cycler 6.399G1 falls
      in this class with TR=0.91 but is documented separately in
      the catalogue under `aldrin-classic-em-k1-outbound` (entry 1).

    For ingest of additional individual members, follow Russell's
    Chapter 5 parent-cycler list (Table 5.5, dissertation lines
    7506-7549) which selects 77 of the 202 simple-model cyclers as
    having at least one launch window with ΔV ≤ 300 m/s in the
    realistic ephemeris model. Appendix C lists detailed reproducible
    cycler data for those 77.

    Russell's text explicitly cross-references several cyclers to the
    SnLm broad-class space (dissertation lines 5476, 7416, 8008):
    - 4.991gG2 = McConaghy "S1L1" (= entry 2 mcconaghy-2006-em-k2
      under McConaghy's convention)
    - 5.658xxx family ≈ low realistic-ephemeris-ΔV cyclers (Russell's
      "consistently low ΔV requirements" remark, line 7420)
    - 6.399G1 = the Aldrin cycler (= entry 1)

    Discrepancy log for the McConaghy mapping:
    - McConaghy 2006 reports V_inf E = 4.7, V_inf M = 5.0, ToF 153 d
    - Russell 2004 Table 4.9 row 1 reports V_inf E = 4.99, V_inf M =
      5.10, ToF 150 d. Cycler code "4.991gG2" — the "4.991" prefix
      matches Russell's simple-model V_inf E.
    - Both characterise the same trajectory; the discrepancy reflects
      circular-coplanar (Russell) vs realistic-ephemeris (McConaghy)
      optimisation. Wide M7 tolerances are needed to collapse the
      two entries.
