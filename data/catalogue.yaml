  flyby_mechanics: null   # schema v2; per-encounter turning_angle_deg + min_altitude_km; null = not yet extracted from source
  bodies: ["V", "E", "M"]
  sequence_canonical: "V-E-M"   # canonical placeholder; actual sequences vary across the family
  sense: "n/a"
  period:
    pair: "VEM-syn"       # the three-body VEM synodic T_syn, NOT the E-M synodic (see CORRECTION note)
    k: 2                  # "two synodic period" = 2 x T_syn (T_syn = VEM synodic ≈ 6.4 yr)
    years: 12.8           # CORRECTED 2026-06-05 (was 4.27): 2 x 6.4-yr T_syn
    note: |
      CORRECTED 2026-06-05 per AAS 17-577 full-paper mining. Jones et al.
      2017 p.3 defines the synodic period explicitly: "The time it takes to
      repeat a given angular alignment of the three planets (the synodic
      period T_syn) is approximately 6.4 years. This is about three Earth-
      Mars synodic periods." Therefore "two synodic period" in this paper
      means 2 x T_syn = 12.8 yr, NOT 2 x the 2.135-yr E-M synodic (= 4.27 yr).
      Confirmed on p.9: "Recall that the repeat period T is 12.8 years."
      The earlier 4.27-yr value was the alternate (E-M synodic) reading
      flagged in data_gaps[period.basis]; the source now resolves it toward
      12.8 yr. The separate 2.13-yr number is the E-M *opportunity* spacing
      (p.3: "The opportunities open every 2.13 years"), not the repeat period.
