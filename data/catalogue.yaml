  model_assumption: circular-coplanar   # schema v2 (2026-06-01); circular-coplanar | analytic-ephemeris | cr3bp; see data/README.md
  cycler_class: single-ellipse   # schema v4 (2026-06-03); single-ellipse | multi-arc | non-keplerian; see docs/notes/multi-arc-classification.md
  delta_v_kms: null   # schema v2; near-ballistic / not-extracted — actual value deferred (per-row Russell ΔV extraction)
  v_infinity_leveraging_dv_kms: null   # schema v2; non-null only for Rogers 2012 establishment variants once their values are extracted
  fleet_size: null   # schema v2; integer count; null where not stated by source
  flyby_mechanics: null   # schema v2; per-encounter turning_angle_deg + min_altitude_km; null = not yet extracted from source
  bodies: ["V", "E", "M"]
  sequence_canonical: "V-E-M"   # canonical placeholder; actual sequences vary across the family
  sense: "n/a"
  period:
    pair: "E-M"          # primary anchor pair; secondary V-E synodic also relevant
    k: 2                  # "two synodic period" per the abstract
    years: 4.27           # 2 x E-M synodic
    note: |
      Jones et al. 2017 reports "two synodic period Earth-Mars-Venus triple
      cyclers" (= 2 x 2.135 yr ≈ 4.27 yr, anchored on the E-M synodic).
      Spec.md §3 references a different VEM beat period: "the natural beat
      is ≈ 6.4 yr (3 x E-M ≈ 4 x E-V)". The 6.4-yr beat is a NECESSARY
      condition for closure but not the only possible period; Jones et al.
      2017 find 2-synodic E-M solutions that incorporate Venus flybys.
  vinf_kms_at_encounters:
    - body: "V"
      vinf_kms: null
      note: "Family-level entry — individual member V_inf values are in the full Jones 2017 paper which is not freely accessible online (NTRS metadata-only)."
    - body: "E"
      vinf_kms: null
      note: |
        Abstract reports "numerous solutions are identified with average transit
        leg excess speed below 5 km/sec, independent of encounter epoch."
        That is an *average* — individual encounter V_inf values not in the
        abstract.
    - body: "M"
      vinf_kms: null
      note: "Same: average transit leg V_inf below 5 km/s per the abstract; individual values TBD."
  orbit_elements:
    a_au: null
    e: null
    perihelion_au: null
    aphelion_au: null
    inclination_deg: null
    note: "Triple cyclers traverse a wider Tisserand graph region; no single (a, e) characterises the family. Individual members would have their own elements."
    periapse_km: null         # schema v2; parallel to perihelion_au for non-Sun primaries; null if not tabulated
    apoapse_km: null          # schema v2; parallel to aphelion_au for non-Sun primaries
