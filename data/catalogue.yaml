  priority_date: "2003-01-01"
  notes: |
    Prototypical Galileo-style tour at Uranus, demonstrating for the first time
    (paper §Conclusions, p. 595) that the Jovian-system tour strategy transfers
    to the Uranian system because the Uranian-satellite/Uranus mass ratios
    mirror the Jovian-satellite/Jupiter mass ratios (Tables 1+2: Titania/U mass
    ratio 4.06e-5 vs Ganymede/J 7.80e-5 — same order of magnitude). Single
    Earth launch with Jupiter gravity assist (closes only in 2008; next similar
    opportunity ~2022, then several decades).

    Tour structure (paper §Uranian Tour Example):
    * Inclination-reduction phase (events 1-9, ~261 d): nine Titania flybys
      crank the initial 13.6-deg arrival inclination down to the equatorial
      plane (paper p. 594).
    * Energy-reduction phase (events 11-32, ~430 d): Oberon for periapsis
      maintenance; Titania, Umbriel and Ariel pump down period while
      preserving periapsis > 4 R_U.
    * Ariel-rendezvous phase (events 33-40, ~115 d): multiple Titania flybys
      followed by Umbriel flybys with a final Umbriel -> Ariel transfer
      arriving at V_inf = 0.92 km/s (under the 1-km/s design goal).
    Total tour duration 810.7 d (~2.2 yr) from Titania arrival to Ariel
    rendezvous. End-to-end mission duration ~13.3 yr (Earth launch to Ariel
    rendezvous).

    Admitted under the v4.7 catalogue-scope expansion (task #294, commit
    5665fc6) as orbit_class=mga_tour — Galileo-style tours are the canonical
    archetype the v4.7 taxonomy was widened to accommodate. Second mga_tour
    row (after tito-2018-mars-free-return, commit b6bcbb3).

    Resolves the #329 paywall gate (PDF acquired by the user 2026-06-16):
    this paper is a Galileo-style satellite tour, NOT a cycler. The #327
    SILVER candidate's V_inf tuple (0.92, 0.96, 0.89) km/s at sequence
    Umbriel-Oberon-Umbriel (1,1) does NOT appear in Table 5 — the 0.92 km/s
    value occurs only at the Ariel terminal rendezvous (event 40), not at
    Umbriel. Different topology (Umbriel-Oberon-Umbriel two-body cycler vs
    a 40-flyby one-shot Galileo-style tour), different structural class
    (cycler vs mga_tour), different evidence ladder (V2-moontour FAIL_QUASI_BOUNDED
    + V3 PASS for the SILVER vs Heaton-Longuski's published STOUR patched-conic).
    So Heaton-Longuski 2003 does NOT prior-publish the #327 SILVER.

    Reproduction status: V0 internal-consistency only. Not reproduced on real
    ephemeris (the SPICE Uranian-kernel work for V4-Uranus is in flight under
    #335). The #335 V4 strict gauntlet, when complete, will be applicable to
    this row.
