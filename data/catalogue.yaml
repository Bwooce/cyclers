  notes: |
    Russell describes this cycler (§3.8) as having "remarkably low energy
    requirements at Earth and Mars" because "the generic return portion of
    this cycler is very near a Hohman transfer". The aphelion ratio of 0.992
    means it just barely doesn't reach Mars's circular orbit in the simplified
    model, so it's TECHNICALLY classed as "near-ballistic" in Russell's
    taxonomy — but in the real ephemeris model with Mars's eccentric orbit
    it crosses Mars's orbit at perihelion and is genuinely ballistic.

    This is one of the lowest-V_inf E-M cyclers known, distinct from the
    other Russell-Ocampo entries above and worth keeping in the seed
    catalogue as a counter-example to "low-V_inf cyclers require Venus".

    Russell 2004 Table 3.4 classifies this cycler under the wider
    ARMIN=0.9 / TRMIN=0.85 "ballistic" net rather than the strict
    AR>=1.0 AND TR>=1.0 criterion. Strictly, this cycler is near-ballistic:
    AR=0.99, TR=1.55; the gravity-assist deflection at Mars (aphelion
    just under Mars's circular-orbit radius) is short of fully ballistic
    and requires a small powered nudge. The `trajectory_regime: ballistic`
    field is retained because Russell and the cycler literature group it
    with the ballistic family; consumers doing powered-flyby DV
    accounting should still compute the residual.
  source_quotes:
    delta_v_kms: "Derived from Russell 2004's tabulated AR / TR via the M2 powered-flyby surrogate (src/cyclerfinder/core/flyby.py): ΔV ≈ (V∞_E + V∞_M) × max(0, 1 − TR) + (1 − AR) × (V∞_E + V∞_M) × 0.025 [AR-correction term active only when AR < 1]. Upper bound; biases near-ballistic entries toward 'requires nudge'. Strict-ballistic rows (AR ≥ 1 AND TR ≥ 1) give ΔV = 0 exactly. AR/TR primary values: Russell 2004 Table 3.4, row 4.3.1.-5."
