    (Russell 2004 dissertation ref [25] McConaghy/Russell/Longuski 2005
    JSR "Towards a Standard Nomenclature for Earth-Mars Cycler
    Trajectories"), the "U" prefix is the up-escalator branch indicator;
    "0L1" indicates zero intermediate Earth-Earth loops and one synodic
    period to repeat. U0L1 is the most propulsion-expensive of the
    cyclers in Rogers 2012 Table 2 (direct LEO DV 8.052 km/s) but also
    enjoys the largest absolute mass savings from V_inf leveraging
    (45.8 mt per Rogers Table 6) — a useful test case for V_inf
    leveraging studies but not a practical candidate for crewed
    Earth-Mars transit.

    DATA COMPLETENESS: orbital elements populated from Rogers 2012
    Table 1; steady-state cycling V_inf at Earth/Mars left null pending
    direct access to McConaghy 2005 dissertation or AIAA 2002-4420.
    M7 matching against finder hits in the high-aphelion (>3 AU)
    regime can use the orbital-element signature.

    DISTINGUISHED FROM S1L1: both are one-synodic Earth-Mars cyclers
    with no intermediate Earth-Mars-Earth loops in the SnLm sense, but
    S1L1 has L=1 (one intermediate Earth-Earth loop) and aphelion ~1.64
    AU just inside Mars's orbit, whereas U0L1 has L=0 (zero intermediate
    Earth loops) and aphelion 3.20 AU far beyond Mars. The "U" prefix
    distinguishes the up-escalator (outbound-to-Mars) branch from the
    down-escalator (inbound-to-Earth) branch on the same family.
  source_quotes:
    a_au: "Rogers et al. 2012 Table 1: 'U0L1 ... Semi-Major Axis, AU: 2.05'."
    e: "Rogers et al. 2012 Table 1: 'U0L1 ... Eccentricity: 0.563'."
    perihelion_au: "Rogers et al. 2012 Table 1: 'U0L1 ... Perihelion Radius, AU: 0.90'."
    aphelion_au: "Rogers et al. 2012 Table 1: 'U0L1 ... Aphelion Radius, AU: 3.20'."
    "legs[0].tof_days": |
      Rogers et al. 2012 Table 4 (STOUR analytic-ephemeris results): row
      'U0L1, 3:2(1)-, LD 11/25/2025, TOF 97 days, Periapse 0.960 AU,
      Apoapse 3.189 AU, V_inf,launch 3.702 km/s, V_inf,flyby 8.049 km/s,
      h_flyby 6,633 km'. The 97-day TOF is the establishment-cycler
      first-leg ToF.
    "period.years": |
      Period = k * synodic = 1 * 2.135 yr = 2.14 yr; derived from S=1
      in the SnLm classification. Consistent with the 4-vehicle
      manifest in Rogers 2012 Table 1 (outbound + inbound x 2 phases).

