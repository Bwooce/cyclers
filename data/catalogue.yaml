  priority_date: "1977-09-05"
  notes: |
    Voyager 1's flown Jupiter-Saturn gravity-assist tour (MJS77, the JST
    high-energy Titan-targeted branch). The catalogue's first SPK-DERIVED
    mga_tour row: the per-encounter hyperbolic-excess velocity (V_inf) is not
    published in clean form in any Voyager mission-overview or dedicated-
    navigation paper (#345 firm negative, including the best-case venue
    McKinley-Van Allen 1976) -- the true V_inf live in unobtainable internal
    JPL documents. #390 instead DERIVES the V_inf directly from the mission's
    archived NAIF reconstructed spacecraft SPK at the already-sourced flyby
    epochs (cyclerfinder.verify.mission_spk.vinf_at_flyby): furnsh DE440 + LSK
    + the spacecraft SPK, sample the planetocentric state over a window around
    closest approach, and read the vis-viva hyperbolic-excess speed
    sqrt(v_rel^2 - 2*mu/r_rel) at the outermost sample where v_rel -> V_inf.

    Encounters (data/390_mission_vinf.jsonl):
    * Jupiter 1979-03-05T12:05 UTC: V_inf 10.773 km/s, CA 4.88 R_J / 277,369 km
      alt. CA radius reproduces the published 4.89 R_J (Kohlhase-Penzo Table IV)
      to <0.2% -- the independent, sourced cross-check (the EXPECTED side of the
      geometry check is published, not computed by us).
    * Saturn 1980-11-12T23:46 UTC: V_inf 15.167 km/s, CA 3.06 R_S / 123,875 km
      alt. The Saturn V_inf is higher than Voyager 2's (10.674 km/s) because
      Voyager 1 took the high-energy Titan-targeted approach.

    Earth departure (1977-09-05) carries no V_inf entry: no launch C3 / departure
    V_inf is published in clean form in the acquired literature, and #390's SPK
    extractor reads the planetocentric flyby V_inf only. Sourced-only discipline
    -> the Earth launch is documented (launch_epoch) but not assigned a
    fabricated departure V_inf.

    validation_level=V0: the V_inf is DERIVED by our own code (orbit_source =
    vinf_source = derived), so it classifies 'unvalidated' on the orthogonal
    provenance-tag tier axis and V0 on the validation_level axis -- the honest
    floor for a self-derived number, even though the closest-approach geometry
    it reproduces matches the published mission record to <1%. Admitted as the
    payoff of #390 (parent-reviewed: V_inf validated to <1% against published
    CA geometry, vis-viva converged). The remaining #345 missions (Galileo,
    Cassini, Pioneer, Juno) follow the identical SPK-extraction pattern.
    See docs/notes/2026-06-19-390-spk-vinf-extractor.md and
    docs/notes/2026-06-19-345-voyager-mariner-mission-digests.md.
  source_quotes:
    "launch_epoch": "Voyager 1 launched 1977-09-05 12:56 UTC (Kohlhase-Penzo 1977 'Voyager Mission Description'; NASA Voyager fact pages)."
    "validity_window.start": "Same as launch_epoch (Voyager 1 launch 1977-09-05)."
