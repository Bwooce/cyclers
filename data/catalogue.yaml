    doi: "10.2514/1.5571"
    url: "https://arc.aiaa.org/doi/abs/10.2514/1.5571"
    note: "Russell-Ocampo's first peer-reviewed publication of the 24 ballistic cycler set. The conference precursor (Russell/Ocampo AAS 03-145) is older but unpublished in archival form."
