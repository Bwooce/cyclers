# ---------------------------------------------------------------------------
# 48-204. Russell-Ocampo Tables 3.9-3.11: 5- and 6-synodic-period ballistic
#         (or near-ballistic) cyclers from Russell 2004 dissertation.
#
#   Source: Russell, R. P. (2004), PhD dissertation, UT Austin Aerospace
#   Engineering, "Global Search and Optimization for Free-Return Earth-Mars
#   Cyclers", hdl.handle.net/2152/1253. 157 entries total spanning
#   Table 3.9  (5-synodic, page 90, 58 entries),
#   Table 3.10 (6-synodic Part I, page 91, 51 entries incl. 4 footnoted
#                a/b/c/d = "Cycler 6S9/6S8/6S7/6S6" of McConaghy et al.),
#   Table 3.11 (6-synodic Part II, page 92, 48 entries).
#
#   Russell's wider ballistic net for these tables is ARMIN=0.9 / TRMIN=0.85
#   (vs strict AR>=1.0 AND TR>=1.0 used in Table 3.4). Per-entry notes flag
#   "Strictly ballistic" (94 entries) vs "Near-ballistic" (63 entries). All
#   trajectory_regime values are "ballistic" per the cycler literature
#   convention.
# ---------------------------------------------------------------------------
- id: russell-ocampo-5.1.1-7
  name: "Russell-Ocampo cycler 5.1.1.-7 (5-synodic, near-ballistic)"
  source: literature
  trajectory_regime: ballistic   # added 2026-06-01; ballistic per cycler-literature convention (incl. Russell's wider net)
  model_assumption: circular-coplanar   # schema v2 (2026-06-01); circular-coplanar | analytic-ephemeris | cr3bp; see data/README.md
  cycler_class: multi-arc   # schema v4 (2026-06-03); single-ellipse | multi-arc | non-keplerian; see docs/notes/multi-arc-classification.md
  invariants:   # schema v4 (2026-06-03); cycle-level identity for multi-arc cyclers; see docs/spec.md §16.7.4
    aphelion_ratio: 1.04   # Russell 2004: outbound-arc aphelion / Mars sma (1.52 AU)
    transit_times_days: [229]   # [outbound E->M, return M->E] transit times in days; sourced from trajectory.segments
    turn_ratio: 0.97   # Russell 2004: required turn angle / max ballistic turn (TR >= 1 => strictly ballistic)
  delta_v_kms: 0.279   # derived from Russell 2004 AR/TR via M2 surrogate; see source_quotes
  v_infinity_leveraging_dv_kms: null   # schema v2; non-null only for Rogers 2012 establishment variants once their values are extracted
  fleet_size: null   # schema v2; integer count; null where not stated by source
  flyby_mechanics:   # SOURCED: Russell 2004 dissertation Table 3.9, row "5.1.1.-7", last column "Required Geocentric Turning Angle at each Flyby (deg)" = [93, 93]. All are EARTH (geocentric) gravity-assist flybys (Russell §3.8: "The last column shows the number of gravity-assisted Earth flybys and the geocentric turning angle associated with each one"). min_altitude_km left null: Russell publishes no per-flyby altitude, only the conditional footnote ">200 km if Turn Ratio >= 1" (this row TR=0.97) — a bound, not a sourced value.
    - body: "E"
      turning_angle_deg: 93
      min_altitude_km: null
    - body: "E"
      turning_angle_deg: 93
      min_altitude_km: null
  bodies: ["E", "M"]
  sequence_canonical: "E-E-M-M"
  sense: "outbound"
  period:
    pair: "E-M"
    k: 5
    years: 10.675
    note: "5 x Earth-Mars synodic period (2.135 yr) per Russell 2004 dissertation Table 3.9 row 5.1.1.-7."
  vinf_kms_at_encounters:
    - body: "E"
      vinf_kms: 5.0
      note: "Russell 2004 dissertation Table 3.9 row 5.1.1.-7: Earth v_inf = 5.0 km/s."
    - body: "M"
      vinf_kms: 4.3
      note: "Russell 2004 dissertation Table 3.9 row 5.1.1.-7: Mars v_inf = 4.3 km/s."
  orbit_elements:
    a_au: null
    e: null
    perihelion_au: null
    aphelion_au: 1.585
    inclination_deg: 0.0
    note: "Aphelion derived from Russell 2004 Table 3.9 Aphelion Ratio AR = 1.04 x 1.524 AU (Mars semi-major axis) = 1.585 AU. Other elements (a, e, perihelion) not directly tabulated in Tables 3.9-3.11."
    periapse_km: null         # schema v2; parallel to perihelion_au for non-Sun primaries; null if not tabulated
    apoapse_km: null          # schema v2; parallel to aphelion_au for non-Sun primaries
    raan_deg: null            # schema v2; right ascension of ascending node (Ω); null for current entries
    arg_periapsis_deg: null   # schema v2; argument of periapsis (ω); null for current entries
    true_anomaly_deg: null    # schema v2; true anomaly at epoch (ν); null for current entries
    epoch_iso8601: null       # schema v2; ISO-8601 epoch for the anomaly; null = generic
  trajectory:
    center: "Sun"             # OCM CENTER_NAME (== top-level primary)
    ref_frame: "ECLIPJ2000"   # OCM REF_FRAME
    time_system: null         # idealized model — epoch-free family
    epoch_tzero: null         # OCM EPOCH_TZERO; null = epoch-free
    segments:                 # === OCM TRAJ ===
      - id: "out-em"
        from: "E"
        to: "M"
        traj_type: "keplerian-arc"
        tof_days: 229
        n_revs: 0
        branch: "single"
        a_au: null              # per-segment elements not tabulated (orbit_elements.a_au null) — see data_gaps[]
        e: null
        note: "Russell 2004 dissertation Table 3.9 row 5.1.1.-7: Earth->Mars (or aphelion) time = 229 days."
      - id: "ret-me"
        from: "M"
        to: "E"
        traj_type: "keplerian-arc"
        tof_days: null          # return M->E leg ToF not tabulated by Russell — see data_gaps[]
        n_revs: null
        branch: null
        a_au: null
        e: null
        note: "Return Mars->Earth leg. Russell 2004 Table 3.4/4.x tabulates only the E->M (or-aphelion) transit time for this row, not the return arc ToF / rev count / per-segment (a,e); tracked in data_gaps."
      - id: "loop-ee"
        from: "E"
        to: "E"
        traj_type: "keplerian-arc"
        tof_days: null          # intermediate Earth-Earth multi-rev loop(s) — see data_gaps[]
        n_revs: null
        branch: null
        a_au: null
        e: null
        note: "Intermediate Earth-Earth loop arc(s) that fill the cycler period between Mars encounters (sequence E-E-M-M). Russell's required-geocentric-turn column tabulates 2 Earth flyby(s) for this row, implying 1 intermediate Earth-Earth loop(s). Multi-rev arc(s) — tof_days / n_revs / branch / (a,e) to be set by the multi-rev Lambert solver (task #54); represented here as a single structural slot, exact multi-loop topology tracked as uncertain in data_gaps[]."
    maneuvers:                # === OCM MAN ===
      - at_segment_boundary: ["out-em", "ret-me"]
        body: "M"
        type: "flyby-ballistic"
        dv_kms: null
        turning_angle_deg: null   # Russell tabulates only GEOCENTRIC (Earth) turn angles; no Mars turn published
        max_turning_angle_deg: 45.3   # COMPUTED achievable ballistic turn = degrees(max_bend(mu_M, R_M+300 km, vinf=4.3 km/s)); vinf sourced from vinf_kms_at_encounters; alt=generic 300 km safe default. Not source-attested.
        periapsis_alt_km: null
        note: "Mars flyby closing the outbound->return transition; V-infinity continuity (4.3 km/s) is the cycle constraint at Mars. dv_kms mirrors the v2 delta_v_kms classification for this row."
      - at_segment_boundary: ["ret-me", "loop-ee"]
        body: "E"
        type: "flyby-ballistic"
        dv_kms: null
        turning_angle_deg: 93   # SOURCED: Russell 2004 'Required Geocentric Turning Angle at each Flyby' column for this row (carried from flyby_mechanics[]). All flybys are EARTH (geocentric).
        max_turning_angle_deg: 89.6   # COMPUTED achievable ballistic turn = degrees(max_bend(mu_E, R_E+300 km, vinf=5 km/s)); vinf sourced from vinf_kms_at_encounters; alt=generic 300 km safe default. Not source-attested.
        periapsis_alt_km: null   # Russell publishes no per-flyby altitude (only the >200 km conditional footnote — a bound, not a value)
        note: "Intermediate Earth flyby (the loop entry); V-infinity 5 km/s. The geocentric turning angle is the sourced Russell value; this row carries 2 Earth flyby(s) in flyby_mechanics, one per intermediate loop entry."
  family:
    id: "russell-5syn-em"
    name: "Russell 5-synodic Earth-Mars ballistic"
    nomenclature: "Russell-Ocampo cycler code"
    continuation_param: {name: "k_synodic", value: 5}
  data_gaps:
    - path: "trajectory.segments[ret-me].tof_days"
      kind: "unknown"
      note: "Return M->E leg time-of-flight not tabulated by Russell 2004 (Table 3.4/4.x give only the E->M transit time for this row)."
      source_hint: "Russell 2004 dissertation Table 3.4 / 4.x"
      todo_ref: "#54-backfill"
    - path: "trajectory.segments[loop-ee]"
      kind: "derive"
      note: "Intermediate Earth-Earth loop arc(s) tof_days / n_revs / branch / (a,e) are computable once the multi-rev Lambert solver closes the arc(s) to the published 5/4.3 km/s V-infinity; not yet derived. Russell tabulates only the transit time + aggregate aphelion, not the loop arc(s)."
      source_hint: "task #54 multi-rev Lambert solver; Russell 2004 Table 3.4/4.x leg descriptors"
      todo_ref: "#54"
    - path: "trajectory.segments"
      kind: "uncertain"
      note: "Segment topology is provisional. sequence_canonical E-E-M-M is the lex-min canonical form; the actual cycle has 2 Earth flyby(s) (Russell required-geocentric-turn column) implying 1 intermediate Earth-Earth loop(s) over the 10.675-yr period. Only a single representative loop-ee slot is materialised here; the full multi-loop decomposition must be verified against Russell 2004 / closed by the task #54 solver."
      source_hint: "Russell 2004 dissertation Table 3.4 / 4.x; task #54 multi-rev Lambert solver"
      todo_ref: "#54"
    - path: "trajectory.segments[out-em].a_au"
      kind: "unknown"
      note: "Per-segment (a,e) of the outbound transit arc not tabulated by Russell 2004 (orbit_elements.a_au/e are null for the same reason — only the aggregate aphelion ratio is published)."
      source_hint: "Russell 2004 dissertation Table 3.4 / 4.x leg descriptors"
      todo_ref: "#54-backfill"
