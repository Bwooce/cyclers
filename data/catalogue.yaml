    structure (Fig. 2, p. 8), high perijove (the low-energy family). Ballistic
    (residual Delta-v below the 1e-8 m/s threshold, p. 13). First publication of
    Callisto-bearing triple cyclers: Callisto is NOT in the 1:2:4 Laplace
    resonance, so the Laplace-resonant machinery (Lynam/Longuski, Hernandez) is
    unavailable; Liang et al. instead exploit a 7:4 NEAR-resonance of the
    (C-G, G-E) synodic periods (~50 d quasi-repeat) absorbed by a
    switched-double-cycler + multi-rev legs (Sec. II.A, III.B).

    TOLERANCE CAVEAT: mu_Jupiter is never printed; idealized-model reproductions
    should treat trailing digits as constant-dependent (validate ToF at ~0.01 d,
    V_inf at ~1e-3 km/s; mining note §5).

    FLYBY-ALTITUDE FICTION: the paper's Table 3 "Flyby Altitude" column
    (1,900,851 / 978,172 / 33,839 / 6,241 / 19,765 km) is computed from the
    required defect Delta-v on the moon-centered hyperbola ignoring Jupiter's
    gravity — a reflection of how little turning is needed, NOT physical periapses
    (1.9e6 km vastly exceeds Callisto's SOI). NOT ingested as altitudes (paper's
    own caveat, p. 16; mining note §9).

    Capability: this member's topology (repeated-moon CGCEC, Callisto 3x per
    cycle) and leg class (multi-rev Lambert legs used as phase-reshaping
    reservoirs) lie OUTSIDE our Phase-6 swept genome (single-ellipse zero-rev
    free-return loops); it does not contradict the Jovian EMPTY-region registry
    verdicts, which remain valid as conditioned (mining note §6).
    REPRODUCED 2026-06-13 (#222): same-model reconstruction (cge_scaffold.py)
    matches Table 3 per-flyby V_inf on both flyby sides to worst 1.52e-2 km/s
    and V_inf continuity to 8.1e-3 km/s, inside the Table 1 print-quantization
    tolerance (0.017-0.14 km/s per flyby); all 4 legs 1-rev multi-rev Lambert
    as published; golden tests tests/search/test_liang_cge_reproduction.py.
  source_quotes:
    "vinf_kms_at_encounters[0].vinf_kms": "Liang et al. 2024 Table 3 (p. 15): first-cycle flyby V_inf — Callisto 5.6730, Ganymede 6.9919, Callisto 5.6698, Europa 4.6685, Callisto 5.8721 km/s."
    "invariants.transit_times_days": "Liang et al. 2024 Table 3 (p. 15): first-cycle per-leg ToF (days) — C->G 31.8973, G->C 18.1697, C->E 29.9343, E->C 19.9747 (flyby #0 at t=0)."
