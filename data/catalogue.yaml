# Jones et al. 2017 reports "thousands of previously undocumented two synodic
# period Earth-Mars-Venus triple cyclers". No individual cycler is named or
# tabulated in the abstract / accessible sources, so we capture the family
# as a single seed entry with citation; individual members are TBD pending
# access to the full paper.
- id: jones-2017-vem-triple-family
  name: "Jones/Hernandez/Jesick VEM triple cyclers (family seed entry)"
  source: literature
