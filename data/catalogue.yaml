#   Source: Russell, R. P. (2004), PhD dissertation, UT Austin Aerospace
#   Engineering, "Global Search and Optimization for Free-Return Earth-Mars
#   Cyclers", hdl.handle.net/2152/1253. 157 entries total spanning
#   Table 3.9  (5-synodic, page 90, 58 entries),
#   Table 3.10 (6-synodic Part I, page 91, 51 entries incl. 4 footnoted
#                a/b/c/d = "Cycler 6S9/6S8/6S7/6S6" of McConaghy et al.),
#   Table 3.11 (6-synodic Part II, page 92, 48 entries).
#
#   Russell's wider ballistic net for these tables is ARMIN=0.9 / TRMIN=0.85
#   (vs strict AR>=1.0 AND TR>=1.0 used in Table 3.4). Per-entry notes flag
#   "Strictly ballistic" (94 entries) vs "Near-ballistic" (63 entries). All
#   trajectory_regime values are "ballistic" per the cycler literature
#   convention.
# ---------------------------------------------------------------------------
