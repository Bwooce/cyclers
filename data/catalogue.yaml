      max_turning_angle_deg: 113.8     # COMPUTED achievable ballistic turn = degrees(max_bend(mu_E, R_E+300 km, vinf=3.4 km/s)); vinf sourced from vinf_kms_at_encounters; alt=generic 300 km safe default. Not source-attested.
