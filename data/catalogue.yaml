    Rall 1970 (MIT TE-34, Hollister adv.) free-fall periodic orbit M5-2E, Appendix F eccentric-inclined Model III.B (one of the 11 orbits that converged in the eccentric-inclined model: M4-1a, M5-1a..e, M5-2a..e). These versions a..e are re-phasings (different oppositions) of the same family, not different families (note §6).

