# 45-47. McConaghy 2005 dissertation: SnLm broad-class Earth-Mars cyclers
# ---------------------------------------------------------------------------
# The McConaghy 2005 Purdue PhD dissertation (e-Pubs AAI3166673) is the
# comprehensive treatment of the SnLm Earth-Mars cycler taxonomy first
# published as conference paper AIAA 2002-4420 (McConaghy, Longuski,
# Byrnes 2002 "Analysis of a Broad Class of Earth-Mars Cycler
# Trajectories") and elaborated across several JSR papers 2004-2006.
#
# Taxonomy: "SnLm" where n = number of Earth-Mars synodic periods per
# full cycle, m = number of intermediate Earth-Earth loops between
# successive Mars encounters. The "U0L1" outlier is a one-synodic
# "Up-escalator" zero-Earth-loop variant from the same broad-class
# enumeration.
#
# At this ingest the dissertation full text was not directly accessible
# (Purdue docs.lib was blocked to WebFetch; ProQuest AAI3166673 abstract
# only; AIAA arc.aiaa.org 403 across DOIs). However Rogers/Hughes/
# Longuski/Aldrin 2012 (AIAA 2012-4746) Table 1 explicitly catalogues
# four members of the McConaghy 2002 broad-class enumeration with full
# circular-coplanar orbital elements: Case 1, Case 2, Case 3, and U0L1
# (alongside Aldrin, VISIT-1, VISIT-2, S1L1). Case 2 and Case 3 are
# already in this catalogue as Russell-Ocampo 2.1.1.+2 and 2.3.1.+1.
# Cases 1 and U0L1 are added below from Rogers 2012 Table 1, with the
# McConaghy 2005 dissertation cited as the comprehensive treatment.
# A separate citation-only family-seed entry preserves the broader
# S2L1 / S3L1 / S1L2 etc. taxonomy attribution for M7 novelty matching.
