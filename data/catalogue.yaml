# 43. Russell/Strange 2009 — Saturnian moon cyclers family seed
# ---------------------------------------------------------------------------
- id: russell-strange-2009-saturnian-multimoon-family
  name: "Russell/Strange Saturnian moon cycler family (family seed, Titan-Enceladus focus)"
  source: literature
  trajectory_regime: ballistic   # added 2026-06-01; v1 catalogue is ballistic-only; field is explicit for future regime expansion
  model_assumption: cr3bp   # schema v2 (2026-06-01); circular-coplanar | analytic-ephemeris | cr3bp; see data/README.md
  cycler_class: non-keplerian   # schema v4 (2026-06-03); single-ellipse | multi-arc | non-keplerian; see docs/notes/multi-arc-classification.md
  orbit_class: cycler   # schema v4.7 (2026-06-15, task #294); scope expansion default — every pre-v4.7 row is a strict cycler (scripts/migrate_catalogue_scope_2026-06-15.py); see data/README.md
  epoch_locked: false   # schema v4.7 (task #294); strict cyclers are NOT epoch-locked
  n_returns: infinite   # schema v4.7 (task #294); strict cyclers complete an unbounded number of returns
  delta_v_kms:        # schema v2; near-ballistic / not-extracted — actual value deferred (per-row Russell ΔV extraction)
  v_infinity_leveraging_dv_kms:        # schema v2; non-null only for Rogers 2012 establishment variants once their values are extracted
  fleet_size:        # schema v2; integer count; null where not stated by source
  flyby_mechanics:        # schema v2; per-encounter turning_angle_deg + min_altitude_km; null = not yet extracted from source
  primary: "Saturn"
  bodies: ["Mimas", "Enceladus", "Tethys", "Dione", "Rhea", "Titan"]
  sequence_canonical: "Saturnian-multi"
  sense: "n/a"
  period:
    pair:
    k:
    years:
    note: |
      Family seed: same paper as the Jovian family entry above
      (Russell/Strange 2009 JGCD). The Saturnian half of the paper
      gives most detail to Titan-Enceladus cyclers, several of which
      "found immediate application as Cassini extended missions options
      that provide frequent low altitude Enceladus flybys" (per search
      snippets of the abstract). No single period characterises the
      family.
  vinf_kms_at_encounters:
  - body: "Titan"
    vinf_kms:
    note: "Family seed — JGCD paper not accessible at ingest."
  - body: "Enceladus"
    vinf_kms:
    note: "Same."
  orbit_elements:
    a_au:
    e:
    perihelion_au:
    aphelion_au:
    inclination_deg:
    periapse_km:              # schema v2; parallel to perihelion_au for non-Sun primaries; null if not tabulated
    apoapse_km:               # schema v2; parallel to aphelion_au for non-Sun primaries
    raan_deg:                 # schema v2; right ascension of ascending node (Ω); null for current entries
    arg_periapsis_deg:        # schema v2; argument of periapsis (ω); null for current entries
    true_anomaly_deg:         # schema v2; true anomaly at epoch (ν); null for current entries
    epoch_iso8601:            # schema v2; ISO-8601 epoch for the anomaly; null = generic
    cr3bp:                    # schema v4 (2026-06-03); CR3BP identity block (all gapped —
                              # Russell/Strange 2009 uses circular-coplanar patched-conic)
      mass_ratio:            # Saturnian multi-moon patched-conic; no single CR3BP mass ratio
      family:                # patched-conic model; not a CR3BP family
      libration_point:       # not applicable
      jacobi_constant:       # not applicable (patched-conic model) → data_gaps
      period_nd:             # not applicable (patched-conic model) → data_gaps
      stability_index:       # not applicable (patched-conic model) → data_gaps
      state_nd:              # not applicable → data_gaps
      lunit_km:              # not applicable → data_gaps
      tunit_s:               # not applicable → data_gaps
  data_gaps:
  - path: "orbit_elements.cr3bp.jacobi_constant"
    kind: "not-applicable"
    note: "Russell/Strange 2009 uses circular-coplanar patched-conic model for the Saturnian system. Jacobi constant is not conserved. CR3BP identity would require the Saturn-moon restricted three-body problem per moon pair."
    source_hint: "Russell & Strange 2009 JGCD full text (paywalled)"
    todo_ref: "#76-cr3bp-backfill"
  - path: "orbit_elements.cr3bp.period_nd"
    kind: "not-applicable"
    note: "Patched-conic model; non-dimensional CR3BP period not applicable."
    source_hint: "Russell & Strange 2009 JGCD full text"
    todo_ref: "#76-cr3bp-backfill"
  - path: "orbit_elements.cr3bp.stability_index"
    kind: "not-applicable"
    note: "Patched-conic model; CR3BP stability index not applicable."
    source_hint: "Russell & Strange 2009 JGCD full text"
    todo_ref: "#76-cr3bp-backfill"
  legs: []
  first_published:
    authors: ["Russell, R. P.", "Strange, N. J."]
    year: 2009
    title: "Cycler Trajectories in Planetary Moon Systems"
    venue: "Journal of Guidance, Control, and Dynamics, Vol. 32, No. 1, pp. 143-157"
    date: "2009-01"
    doi: "10.2514/1.36610"
    url: "https://arc.aiaa.org/doi/abs/10.2514/1.36610"
  corroborating_sources:
  - authors: ["Russell, R. P.", "Strange, N. J."]
    year: 2007
    title: "Planetary Moon Cycler Trajectories"
    venue: "AAS/AIAA Space Flight Mechanics Meeting, Sedona AZ, January 29 - February 1, 2007"
    doi:
    url: "https://trs.jpl.nasa.gov/handle/2014/40318"
    note: "Conference precursor."
  priority_date: "2007-01-29"
  notes: |
    SCHEMA-MISMATCH FLAG: Saturnian cyclers may overlap with CR3BP
    territory depending on which moon pair is considered (Titan, much
    more massive than the Saturnian midsize moons, can be patched-conic
    modelled; Enceladus / Mimas / Tethys cyclers tend toward
    low-energy / manifold regimes that are CR3BP-natural). Treat as
    "candidates for future ingest" pending model decision; for now
    record the citation only.

    Per search-snippet abstract: "the Saturn-Titan-Enceladus system was
    investigated in the most detail in the context of recent Cassini
    discoveries"; "For the Titan-Enceladus cyclers, Saturn's G rings
    pose a hazard out to approximately 176,000 km"; "several of the
    high energy Titan-Enceladus cyclers found immediate application as
    Cassini extended missions options that provide frequent low
    altitude Enceladus flybys."

    Sibling of the Jovian-family entry above. As individual cyclers
    are split out, they may need new body codes for Saturnian moons
    (already reserved in data/README.md schema-extended section).

    TIER-1/TIER-2 SPLIT (moon-tour Tier-1, task #76): Titan members are
    Tier-1 patched-conic-modellable (primary: Saturn, circular-coplanar
    V_inf about Saturn); midsize-moon members (Mimas/Enceladus/Tethys)
    defer to the CR3BP Tier-2 milestone. As individual Titan cyclers are
    split out they take cycler_class: multi-arc / model_assumption:
    circular-coplanar. This family-seed row stays cycler_class:
    non-keplerian because its midsize members are genuinely CR3BP — no
    silent whole-row re-tag (that would falsely claim the
    Enceladus/Mimas members are patched-conic). An individual Titan-only
    row is created only when a sourced member is ingested.
  source_quotes:
    notes: |
      Russell/Strange 2009 JGCD abstract (via web search snippets):
      "the Saturn-Titan-Enceladus system was investigated in the most
      detail in the context of recent Cassini discoveries"; "For the
      Titan-Enceladus cyclers, Saturn's G rings pose a hazard out to
      approximately 176,000 km."

