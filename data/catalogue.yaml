  flyby_mechanics:   # SOURCED: Genova & Aldrin 2015 (AAS-15), p.3 body text + Fig. 3 caption: "The nearly monthly lunar encounters are targeted to 3,000 km perilune on the lunar farside ... bringing the cycler back to a 3,000 km perigee altitude for each Earth encounter". turning_angle_deg left null: this is a CR3BP (Jacobi-constant) model -- a patched-conic heliocentric/geocentric turn angle is not defined the same way and the paper publishes none.
  - body: "Moon"
    turning_angle_deg:
    min_altitude_km: 3000     # SOURCED: 3,000 km perilune (lunar farside), Genova & Aldrin 2015 p.3.
  - body: "E"
    turning_angle_deg:
    min_altitude_km: 3000     # SOURCED: 3,000 km perigee altitude per Earth encounter, Genova & Aldrin 2015 p.3 / Fig. 3 caption.
