      max_turning_angle_deg: 113.8     # COMPUTED achievable ballistic turn = degrees(max_bend(mu_E, R_E+300 km, vinf=3.4 km/s)); vinf sourced from vinf_kms_at_encounters; alt=generic 300 km safe default. Not source-attested.
      periapsis_alt_km:          # Russell publishes no per-flyby altitude (only the >200 km conditional footnote — a bound, not a value)
      note: "First intermediate Earth flyby (loop entry, Russell 2004 Table 3.8 encounter 3, t=1109 d); V-infinity 3.4 km/s; sourced geocentric turn angle 81 deg (flyby_mechanics[0])."
    - at_segment_boundary: ["loop-ee-1", "loop-ee-2"]
      body: "E"
      type: "flyby-ballistic"
      dv_kms: 0.0
      turning_angle_deg: 81     # SOURCED: Russell 2004 'Required Geocentric Turning Angle at each Flyby' column, flyby_mechanics[1]. All flybys are EARTH (geocentric).
      max_turning_angle_deg: 113.8     # COMPUTED achievable ballistic turn = degrees(max_bend(mu_E, R_E+300 km, vinf=3.4 km/s)); vinf sourced from vinf_kms_at_encounters; alt=generic 300 km safe default. Not source-attested.
      periapsis_alt_km:          # Russell publishes no per-flyby altitude (only the >200 km conditional footnote — a bound, not a value)
      note: "Second intermediate Earth flyby between loop arcs 1 and 2 (Russell 2004 Table 3.8 encounter 4, t=1474 d); V-infinity 3.4 km/s; sourced geocentric turn angle 81 deg (flyby_mechanics[1])."
    - at_segment_boundary: ["loop-ee-2", "loop-ee-3"]
