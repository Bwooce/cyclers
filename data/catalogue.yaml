  bodies: ["E", "Moon"]
  sequence_canonical: "E-Moon"
  sense: "n/a"
  period:
    pair: "E-Moon"
    k:
    years:
    apsidal_rotation_days: 553   # SOURCED 2026-06-10 (#184): Genova & Aldrin 2015 Fig. 5 caption p.5 — 553 d for one full apsidal revolution; 21 complete cycles (22 lunar flybys) from TLI 2019-07-12 to final perigee 2021-01-15. Natural solar-perturbed super-period of the 3-petal orbit.
    note: |
      The paper describes a circumlunar periodic orbit with Earth
      encounters every 7 or 10 days and lunar encounters every 26 days.
      The 26-day Moon-encounter cadence corresponds to one lunar
      sidereal period (27.3 d) modulo phasing; the cycler is qualitatively
      a 3-petal (3:1) lunar resonant trajectory in the Earth-Moon
      rotating frame. The single "period" of the cycler as a whole is
      not isolated in the accessible abstract — left null with the
      cadence captured below as legs/encounters.
