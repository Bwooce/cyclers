      source_hint: "Russell 2004 dissertation Table 3.4 / 4.x leg descriptors"
      todo_ref: "#54-backfill"
    - path: "trajectory.segments[*].n_revs"
      kind: "derive"
      note: "Rev counts / branch for the multi-rev ret-me (558 d) and loop arcs (366 d, 182 d, 365 d) are derivable once the multi-rev Lambert solver closes them to the published 7.8/9.9 km/s V-infinity; Russell tabulates encounter epochs (hence ToF) but not the rev count. Topology is RESOLVED for this cycler: 4 Earth flybys imply 3 intermediate Earth-Earth loops (loop-ee-1/2/3), all materialised with sourced ToFs from Table 3.5."
      source_hint: "task #54 multi-rev Lambert solver; Russell 2004 Table 3.5 cumulative epochs"
      todo_ref: "#54"
