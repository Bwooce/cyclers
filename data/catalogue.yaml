      surfaced the Uranian near-miss class with Oberon-Titania-Oberon (1,1)
      at residual 0.062 km/s — the conceptual precursor to this row.
    * #312 (Uranus extended sweep, commits ee5e45e/b9af576/bebaeaf/d0d5898):
      surfaced THIS candidate via 24x24 offset sweep at Uranus-Oberon-Umbriel
      pair, basin floor residual 0.025 km/s, V_inf=(0.92, 0.96, 0.89) km/s,
      ToF 14.94 d/leg. Coarse-grid sequence Umbriel-Oberon-Umbriel (1,1).
    * #327 (gate-passing IC verification, commit 3500c71): confirmed the
      SILVER's stored V_inf and residual at the 2-moon convention basin
      floor. Verdict REAL_CANDIDATE_AWAITING_306.
    * #324 (physical-sanity max-bend gate, commit bdd64e6): 14.7 deg at
      Umbriel + 39 deg at Oberon (both above 5 deg threshold — flybys
      are physically usable, NOT V_inf-magnitude-only matches at unphysical
      encounter geometries).
    * #328 (Uranian cycler literature deep-dive, commits 5199949/eb25a20):
      offline literature_check against the 41-anchor expanded KNOWN_CORPUS
      (including 6 new Uranian-dynamics anchors added by #328) returned
      not-found. Heaton-Longuski 2003 (the only known paywalled adjacent
      Uranian-tour paper) was flagged for #329 acquisition.
    * #329 (Heaton-Longuski 2003 paywall, resolved 2026-06-16): user
      acquired the PDF via AIAA institutional access (filed in the private paper corpus
      commit 0c26264). Direct read confirmed the paper is a Galileo-style
      mga_tour (40 flybys, 810.7 d, Ariel orbit insertion at V_inf=0.92 km/s
      AT ARIEL, not at Umbriel-Oberon). The SILVER's V_inf tuple
      (0.92, 0.96, 0.89) at Umbriel-Oberon-Umbriel is ABSENT from Table 5.
      Different topology, different structural class — NOT a rediscovery.
    * #330 (V2-moontour gauntlet, commits 5494638/ff6a4ad): all 10 Lambert
      cycles convergent; strict V2 FAILS_QUASI_BOUNDED (drift exceeds the
      50,000 km cycler-class floor) BUT the bounded oscillation pattern
      matches the v4.7 quasi_cycler structural definition exactly.
    * #331 (V3 6D n-body REBOUND IAS15, commits 79e9a11/cae57ca): REBOUND
      IAS15 (symplectic Gauss-Radau, eps=1e-12) reproduces the V2 driver's
      per-cycle drift series to nanometer precision (max |V3-V2| = 1.84e-6 km
      at n_cycles=10, vs the 100 km agreement floor). The bounded-drift
      signature is a REAL dynamical property of the Keplerian + 5-moon model,
      NOT a Lambert/DOP853 integrator artifact.
    * #332 (V4-scipy with J2 + 5-moon circular Battin, commits 7d43631/
      a202b72/7c797bb): scipy DOP853 with Uranus J2 (Jacobson 2014 AJ 148:76,
      3.34343e-3) + Battin third-body perturbations from Miranda/Ariel/
      Umbriel/Titania/Oberon at CIRCULAR-COPLANAR ephemerides. V4-vs-V3
      agreement 2-5% on drifts of 3e5-5e5 km. Bounded oscillation persists.
    * #335 (V4-strict with URA111 SPICE real ephemerides, commits 8ad472e/
      2eda155/ce4b334/011a289): JPL/NAIF URA111 SPICE kernel installed,
      sample-and-pin Umbriel/Oberon real eccentricities (e_Umbriel=0.00411,
      e_Oberon=0.00056) + inclinations (~75 deg in J2000). Verdict at the
      3 sample epochs: 2000-01-15 FAILS (drift 91,000 km), 2030-06-21 PASSES
      (10,000 km), 2050-12-31 PASSES (4,000 km). MIXED epoch-dependent.
    * #338 (annual epoch sweep 2000-2099, commits 65ab8cf/309767d/f03140b):
      100 annual epochs at DOY=June 21. 94/100 PASS at 50,000 km floor.
      6 failures all in the last 15 yr of URA111 kernel coverage (kernel-edge
      artifact, not dynamical). Interior PASS run 2000-06-21 -> 2083-06-21
      is 85/85 = 100%. EFFECTIVELY_CYCLIC verdict; recommended launch_epoch
      2041 (center of 84-yr PASS run).

    Sub-year DOY sensitivity exists: 2000-01-15 FAILS V4-strict while
    2000-06-21 PASSES (same year, different launch day). Validity_window
    assumes June 21 DOY launch. Sub-year boundary characterization is a
    follow-up task (Phase 2 of #338). For now, the row's launch_epoch
    intentionally fixes the DOY at June 21.

    URA111 SPICE kernel coverage ends 2099 (the 2084-2099 failures are
    kernel-edge extrapolation artifacts, not dynamical). A fresher Uranian
    satellite kernel (post-URA111) is needed to extend the validity_window
    beyond 2083. Tracked as follow-up.

    Literature-novelty: cleared against the 41-anchor expanded KNOWN_CORPUS
    via #328's structured triage (DIRECT/ADJACENT/TOUR/DYNAMICS/MISSION/
    NO_MATCH classifier) AND via direct PDF read of Heaton-Longuski 2003 JSR
    (the only known paywalled adjacent Uranian-tour paper, resolved #329).
    Per `feedback_literature_novelty_check_baseline`: not-found is
    necessary-not-sufficient — but with all known adjacent papers cleared
    structurally, this is the highest-confidence literature-fresh verdict
    achievable within the project's offline + paywall-resolved corpus.

