# ---------------------------------------------------------------------------
# Ross & Roberts-Tsoukkas 2025 (AAS 25-621) — five STABLE prograde Earth-Moon
# (k1,k2)-cycler families (planar CR3BP). Adopted into the CR3BP lane #212b
# (commit 4be2375); USER-approved catalogue writeback #216.
#
# SOURCED (V0-grade) EXPECTED side per row: mass_ratio mu (p. 3), and the
# C^stable / T^stable / stability-verdict columns of Table 3 (p. 11) — 15-16
# digit values. DERIVED (self-consistency-checked, NOT goldens): the symmetric
# perpendicular-crossing state0 = (x0, 0, 0, 0, ydot0, 0) recovered by our
# fixed-Jacobi 1-D corrector (the §5 solve); the stability parameter nu is our
# Barden half-period-monodromy result. validation_level V1: same-model CR3BP
# reproduction of a sourced same-model CR3BP orbit (corrector closure + period
# match to T^stable + independent Radau closure + published |nu|<1 verdict) —
# the Russell circular-row precedent. See
# docs/notes/2026-06-12-ross-adoption-results.md and
# docs/notes/2026-06-11-ross-roberts-tsoukkas-2025-mining.md.
# ---------------------------------------------------------------------------
- id: ross-rt-em-cycler-11-2025
  name: "Ross/Roberts-Tsoukkas stable Earth-Moon (1,1) prograde cycler (CR3BP)"
  source: literature
  trajectory_regime: ballistic   # fully ballistic prograde cycler (paper title); no maintenance dV
  model_assumption: cr3bp   # planar CR3BP (PCR3BP), paper Sec. 1 / p. 3; schema v2 enum
  cycler_class: non-keplerian   # rotating-frame periodic orbit, not a Kepler ellipse
  orbit_class: cycler   # schema v4.7 (2026-06-15, task #294); scope expansion default — every pre-v4.7 row is a strict cycler (scripts/migrate_catalogue_scope_2026-06-15.py); see data/README.md
  epoch_locked: false   # schema v4.7 (task #294); strict cyclers are NOT epoch-locked
  n_returns: infinite   # schema v4.7 (task #294); strict cyclers complete an unbounded number of returns
  validation_level: V2   # schema v4.5; V2-ballistic (spec §14): >=3 continuous laps with bounded rotating-frame drift, evaluated in the row's DEFINING MODEL (CR3BP — like-for-like scope, same convention as the V1 scoping). Evidence: same-model corrector reproduction (V1 base) + 100-period inertial REBOUND/IAS15 bounded-band run (3x the measured-delta1 discrimination threshold; docs/notes/2026-06-13-ross-v2-longspan-evidence.md; tests/search/test_cr3bp_v2_longspan.py) + Barden |nu|<1 in the published stable window. STABLE verdict from nu + the long-span run, never the 5-period gate. No real-ephemeris claim; V2-ballistic is this lane's ceiling. Details in scripts/backfill_validation_level.py _LEVEL_BY_ID + cyclerfinder.data.validate._LEVEL_EVIDENCE.
  delta_v_kms:        # ballistic
  v_infinity_leveraging_dv_kms:
  fleet_size:
  flyby_mechanics:
  primary: "Earth"
  bodies: ["E", "Moon"]
  sequence_canonical: "E-Moon"
  sense: "n/a"
  period:
    pair: "E-Moon"
    k: 1
    years:
    note: |
      Rotating-frame period T^stable = 10.29206921007976 TU (Ross Table 3,
      p. 11), where 1 TU = sidereal month / 2pi = 27.321661 d / 2pi =
      4.348377401631 d (p. 3) -> 44.753800 d (Table 4 day column, p. 13).
      Encounter cadence: 1 perigee + 1 perilune pass per period; T^stable is
      within ~1% of the 2:3 resonance with the synodic month (p. 11). The
      catalogue's heliocentric-synodic-multiple `years` convention does not
      apply to an Earth-Moon CR3BP periodic orbit -> null.
  vinf_kms_at_encounters:
  - body: "E"
    vinf_kms:
    note: "CR3BP periodic orbit: the conserved quantity is the Jacobi constant (C^stable), not patched-conic V_inf. Quoting V_inf would be model-mismatched (per arenstorf-em-figure8-1963 convention)."
  - body: "Moon"
    vinf_kms:
    note: "Same — Jacobi-constant model, not patched-conic."
  orbit_elements:
    a_au:
    e:
    perihelion_au:
    aphelion_au:
    inclination_deg:
    note: "Heliocentric Keplerian elements inapplicable: periodic solution in the rotating Earth-Moon barycentric frame, planar (PCR3BP). The CR3BP identity tuple below carries the orbit's identity."
    periapse_km:
    apoapse_km:
    raan_deg:
    arg_periapsis_deg:
    true_anomaly_deg:
    epoch_iso8601:
    cr3bp:
      family: "(1,1) prograde Earth-Moon cycler"   # SOURCED: Ross & Roberts-Tsoukkas 2025 Def. 1 (p. 5), Table 3 (p. 11): k1=1 U1- crossings, k2=1 U2+ crossings per cycle.
      mass_ratio: 1.2150584270572e-2   # SOURCED: Ross & Roberts-Tsoukkas 2025 p. 3 (Earth-system GM ratio, DE440).
      libration_point:        # not a libration-point orbit; built from L1 Lyapunov manifold-tube seeding but is itself a (k1,k2)-cycler.
      jacobi_constant: 3.151175879508174   # SOURCED: Ross Table 3 (p. 11) C^stable_(1,1) (nu=0 midpoint of the stable subfamily). Convention C = (x^2+y^2)+2(1-mu)/r1+2mu/r2 - v^2 (Eq. 3, p. 3), matches our jacobi_constant convention.
      period_nd: 10.29206921007976   # SOURCED: Ross Table 3 (p. 11) T^stable_(1,1) in TU.
      stability_index: -0.00334   # DERIVED (our Barden half-period-monodromy nu, Eqs. 13-15): linearly STABLE (|nu|<1), nu~0 midpoint. NOT a golden; published verdict is "stable", value is our reproduction.
      state_nd: [-0.7682140805, 0.0, 0.0, 0.0, -0.2568154857, 0.0]   # DERIVED (NOT a golden): symmetric perpendicular x-axis-crossing IC (x0,0,0,0,ydot0,0) recovered by our fixed-Jacobi 1-D corrector at C^stable; self-consistency-checked (orbit closes perpendicularly, Jacobi enforced, independent Radau closure). state0 is not printed in the source.
      lunit_km: 384400.0   # SOURCED: Ross p. 3 (a_m, Earth-Moon distance = 1).
      tunit_s: 375699.8   # SOURCED: Ross p. 3 (1 TU = 27.321661 d / 2pi).
      jacobi_max: 3.151175879916394   # SOURCED: Ross Table 3 (p. 11) C^max_(1,1), the Jacobi at which the family first emerges (C^max < C_(k1,k2) < C1).
      energy_regime: "Case 3"   # SOURCED (p. 13 text): C^stable < C2 = 3.172160450399808 -> L2 neck open (exterior escape energetically open).
      tof_days_bounds: [44.753800, 44.753800]   # v4.2 backfill: single-period CR3BP orbit; bounds = [period, period] in days (Ross Table 4 day column, p. 13).
  source_ephemeris:        # v4.2 backfill: pure CR3BP, no ephemeris dependency.
  data_gaps:
  - path: "orbit_elements.cr3bp.state_nd"
    kind: "derive"
    note: "Ross & Roberts-Tsoukkas 2025 prints no initial-state vector for any member (publication gap, mining note §5). state_nd is DERIVED in-repo by the fixed-Jacobi symmetric 1-D corrector from the sourced (mu, C^stable) and self-consistency-checked against the sourced T^stable + an independent Radau closure; it is recorded with provenance, never as a golden."
    source_hint: "scripts/cr3bp_ross_reproduce.py; tests/search/test_cr3bp_ross_families.py; 2026 journal version (Roberts-Tsoukkas & Ross) may print ICs."
    todo_ref: "#216"
  legs: []
  first_published:
    authors: ["Ross, S. D.", "Roberts-Tsoukkas, M."]
    year: 2025
    title: "Stable, Low-Energy Prograde Earth-Moon Cycler Orbits"
    venue: "AAS/AIAA Astrodynamics Specialist Conference, 2025, paper AAS 25-621"
    date: "2025-08"
    doi:
    url: "https://ross.aoe.vt.edu/papers/ross-roberts-tsoukkas-2025-AAS-25-621.pdf"
    note: |
      LaTeX preprint dated 2025-07-17. A 2026 journal version exists
      ("Stable Prograde Earth-Moon Multi-Orbiter Cyclers via Three-Body
      Dynamics," Roberts-Tsoukkas & Ross); re-verify table/page numbering
      against it before embedding citations in code comments.
  corroborating_sources: []
  priority_date: "2025-08-01"
  notes: |
    First publication of STABLE, fully ballistic, prograde Earth-Moon cyclers
    (the class our CR3BP lane previously lacked — all prior lane discoveries
    were unstable Lyapunovs). The (1,1) family's stable subfamily is extremely
    narrow (perilune-distance width Delta_p_m = 0.13 km, Table 3); this row is
    its nu=0 midpoint. Reproduced in-repo (#212b, commit 4be2375): corrector
    closes on (C^stable, T^stable), Barden stability nu=-0.00334 (|nu|<1), and
    an independent Radau integration closes the full period with dJ < 1e-12.

    MODEL: pure planar CR3BP (PCR3BP). No bicircular / solar-gravity /
    lunar-eccentricity / ephemeris refinement (the paper's stated future work);
    any cross-fidelity persistence claim must wait for the 2026 journal. Every
    number here is PCR3BP-only.
  source_quotes:
    "orbit_elements.cr3bp.jacobi_constant": "Ross & Roberts-Tsoukkas 2025 Table 3 (p. 11): (1,1) C^stable = 3.151175879508174."
    "orbit_elements.cr3bp.period_nd": "Ross & Roberts-Tsoukkas 2025 Table 3 (p. 11): (1,1) T^stable = 10.29206921007976 TU; Table 4 (p. 13) day column 44.753800 d."
    "orbit_elements.cr3bp.mass_ratio": "Ross & Roberts-Tsoukkas 2025 p. 3: mu = 1.2150584270572e-2."

