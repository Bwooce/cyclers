# ---------------------------------------------------------------------------
# 45-47. McConaghy 2005 dissertation: SnLm broad-class Earth-Mars cyclers
# ---------------------------------------------------------------------------
# The McConaghy 2005 Purdue PhD dissertation (e-Pubs AAI3166673) is the
# comprehensive treatment of the SnLm Earth-Mars cycler taxonomy first
# published as conference paper AIAA 2002-4420 (McConaghy, Longuski,
# Byrnes 2002 "Analysis of a Broad Class of Earth-Mars Cycler
# Trajectories") and elaborated across several JSR papers 2004-2006.
#
# Taxonomy: "SnLm" where n = number of Earth-Mars synodic periods per
# full cycle, m = number of intermediate Earth-Earth loops between
# successive Mars encounters. The "U0L1" outlier is a one-synodic
# "Up-escalator" zero-Earth-loop variant from the same broad-class
# enumeration.
#
# At this ingest the dissertation full text was not directly accessible
# (Purdue docs.lib was blocked to WebFetch; ProQuest AAI3166673 abstract
# only; AIAA arc.aiaa.org 403 across DOIs). However Rogers/Hughes/
# Longuski/Aldrin 2012 (AIAA 2012-4746) Table 1 explicitly catalogues
# four members of the McConaghy 2002 broad-class enumeration with full
# circular-coplanar orbital elements: Case 1, Case 2, Case 3, and U0L1
# (alongside Aldrin, VISIT-1, VISIT-2, S1L1). Case 2 and Case 3 are
# already in this catalogue as Russell-Ocampo 2.1.1.+2 and 2.3.1.+1.
# Cases 1 and U0L1 are added below from Rogers 2012 Table 1, with the
# McConaghy 2005 dissertation cited as the comprehensive treatment.
# A separate citation-only family-seed entry preserves the broader
# S2L1 / S3L1 / S1L2 etc. taxonomy attribution for M7 novelty matching.
- id: mcconaghy-2005-em-case1
  name: "Case 1 ballistic two-synodic-period Earth-Mars cycler (S2L1 family)"
  source: literature
  trajectory_regime: ballistic   # circular-coplanar ballistic per Rogers 2012 Table 1 column "Number of Vehicles: 4"
  model_assumption: circular-coplanar   # schema v2 (2026-06-01); circular-coplanar | analytic-ephemeris | cr3bp; see data/README.md
  cycler_class: single-ellipse   # schema v4 (2026-06-03); single-ellipse | multi-arc | non-keplerian; see docs/notes/multi-arc-classification.md
  delta_v_kms: null   # schema v2; near-ballistic / not-extracted — actual value deferred (per-row Russell ΔV extraction)
  v_infinity_leveraging_dv_kms: null   # schema v2; non-null only for Rogers 2012 establishment variants once their values are extracted
  fleet_size: 4   # Rogers et al. 2012, AIAA 2012-4746, Table 1, p.5, row 'Case 1' (Number of Vehicles: 4)
  flyby_mechanics: null   # schema v2; per-encounter turning_angle_deg + min_altitude_km; null = not yet extracted from source
  bodies: ["E", "M"]
  sequence_canonical: "E-E-M-M"   # 2-synodic with intermediate Earth encounter; SnLm = S2L1
  sense: "outbound"
  period:
    pair: "E-M"
    k: 2
    years: 4.27
    note: "Two Earth-Mars synodic periods = 2 x 2.135 yr = 4.27 yr; consistent with the four-vehicle count in Rogers 2012 Table 1 (one vehicle per outbound/inbound branch x 2 synodic phases)."
  vinf_kms_at_encounters:
    - body: "E"
      vinf_kms: null
      note: |
        Steady-state cycling V_inf at Earth not in Rogers 2012 Table 1 (Table 1
        gives orbital elements only). Rogers 2012 Table 3 reports the
        4:3(2)- establishment-cycler V_inf,flyby = 3.378 km/s (the post-Earth
        flyby V_inf for the establishment trajectory matching Case 1's
        orbital elements). McConaghy/Longuski/Byrnes 2002 AIAA 2002-4420
        (paywalled at AIAA) is the originating source for the steady-state
        cycler V_inf; Russell 2004 Table 3.4 does not pair "Case 1" to a
        Russell-numbered row (only Case 2 = 2.1.1.+2 and Case 3 = 2.3.1.+1
        are footnoted).
    - body: "M"
      vinf_kms: null
      note: "Same — steady-state V_inf at Mars not transcribed by Rogers 2012; awaiting direct access to McConaghy 2005 dissertation or AIAA 2002-4420."
  orbit_elements:
    a_au: 1.22
    e: 0.238
    perihelion_au: 0.93
    aphelion_au: 1.51
    inclination_deg: 0.0
    note: "Rogers et al. 2012 Table 1: 'Case 1 ... Semi-Major Axis 1.22 AU, Eccentricity 0.238, Aphelion Radius 1.51 AU, Perihelion Radius 0.93 AU' (circular-coplanar model). 0.0 inclination follows from the modelling assumption."
    periapse_km: null         # schema v2; parallel to perihelion_au for non-Sun primaries; null if not tabulated
    apoapse_km: null          # schema v2; parallel to aphelion_au for non-Sun primaries
    raan_deg: null            # schema v2; right ascension of ascending node (Ω); null for current entries
    arg_periapsis_deg: null   # schema v2; argument of periapsis (ω); null for current entries
    true_anomaly_deg: null    # schema v2; true anomaly at epoch (ν); null for current entries
    epoch_iso8601: null       # schema v2; ISO-8601 epoch for the anomaly; null = generic
  # Schema v3 (2026-06-01): migrated from flat legs[] to OCM-aligned trajectory{}
  # per the §16.6.5 backfill (task #66). Only the single source-attested E->M
  # leg (365 d, Rogers 2012 Table 4) is populated; the return M->E leg and the
  # intermediate Earth-Earth loop that give this S2L1 (E-E-M-M) cycler its
  # topology are known-unknowns tracked in data_gaps[]. The outbound segment
  # inherits the orbit_elements ellipse (a=1.22, e=0.238) per the s1l1 exemplar.
  trajectory:
    center: "Sun"             # OCM CENTER_NAME (== top-level primary)
    ref_frame: "ECLIPJ2000"   # OCM REF_FRAME
    time_system: null         # idealized circular-coplanar — epoch-free family
    epoch_tzero: null         # OCM EPOCH_TZERO; null = epoch-free
    segments:                 # === OCM TRAJ ===
      - id: "out-em"
        from: "E"
        to: "M"
        traj_type: "keplerian-arc"
        tof_days: 365
        n_revs: 0
        branch: "single"
        a_au: 1.22
        e: 0.238
        note: "Rogers 2012 Table 4 (STOUR analytic-ephemeris establishment trajectory) reports TOF = 365 days for the 4:3(2)- Case 1 trajectory. Note this is the establishment-cycler first-leg ToF, not necessarily the steady-state cycler nominal; McConaghy 2005 dissertation would give the steady-state value. a/e are the cycler ellipse from Rogers 2012 Table 1."
      - id: "ret-me"
        from: "M"
        to: "E"
        traj_type: "keplerian-arc"
        tof_days: null          # return leg ToF not tabulated — see data_gaps[]
        n_revs: null
        branch: null
        a_au: 1.22
        e: 0.238
        note: "Return Mars->Earth leg of the Case 1 cycle. ToF not extracted from Rogers 2012 / AIAA 2002-4420; tracked in data_gaps. a/e assumed equal to the outbound arc's cycler ellipse pending the steady-state per-leg decomposition."
      - id: "loop-ee"
        from: "E"
        to: "E"
        traj_type: "keplerian-arc"
        tof_days: null          # the intermediate Earth-Earth multi-rev loop — see data_gaps[]
        n_revs: null
        branch: null
        a_au: null
        e: null
        note: "The single intermediate Earth-Earth loop that gives Case 1 its 'L1'; fills the remainder of the 4.27-yr 2-synodic period. Multi-rev arc — tof_days / n_revs / branch / (a,e) to be set by the multi-rev Lambert solver (task #54)."
    maneuvers:                # === OCM MAN ===
      - at_segment_boundary: ["out-em", "ret-me"]
        body: "M"
        type: "flyby-ballistic"
        dv_kms: null
        turning_angle_deg: null
        periapsis_alt_km: null
        note: "Mars flyby closing the outbound->return transition. dv_kms null mirrors the v2 delta_v_kms (not extracted)."
      - at_segment_boundary: ["ret-me", "loop-ee"]
        body: "E"
        type: "flyby-ballistic"
        dv_kms: null
        turning_angle_deg: null
        periapsis_alt_km: null
        note: "Intermediate Earth flyby (the 'L1' loop entry); ballistic."
  family:
    id: "s2l1-em"
    name: "S2L1 Earth-Mars 2-synodic (McConaghy broad-class)"
    nomenclature: "Russell-McConaghy SnLm"
    continuation_param: {name: "k_synodic", value: 2}
  data_gaps:
    - path: "trajectory.segments[ret-me].tof_days"
      kind: "unknown"
      note: "Return M->E leg time-of-flight not tabulated by Rogers 2012; needs the McConaghy 2005 dissertation / AIAA 2002-4420 steady-state cycler decomposition."
      source_hint: "McConaghy 2005 Purdue PhD AAI3166673 / McConaghy/Longuski/Byrnes 2002 AIAA 2002-4420"
      todo_ref: "#54-backfill"
    - path: "trajectory.segments[loop-ee]"
      kind: "derive"
      note: "Intermediate Earth-Earth loop tof_days / n_revs / branch / (a,e) computable once the multi-rev Lambert solver closes the arc; not yet derived."
      source_hint: "task #54 multi-rev Lambert solver"
      todo_ref: "#54"
  first_published:
    authors: ["McConaghy, T. T.", "Longuski, J. M.", "Byrnes, D. V."]
    year: 2002
    title: "Analysis of a Broad Class of Earth-Mars Cycler Trajectories"
    venue: "AIAA/AAS Astrodynamics Specialist Conference, Monterey CA, AIAA 2002-4420"
    doi: "10.2514/6.2002-4420"
    url: null
    note: "First publication of the broad-class enumeration that includes Case 1. The journal version is McConaghy/Longuski 2004 JSR 'Analysis of a Class of Earth-Mars Cycler Trajectories' (DOI 10.2514/1.11939, paywalled). The comprehensive dissertation treatment is McConaghy 2005 Purdue PhD."
  corroborating_sources:
    - authors: ["McConaghy, T. T."]
      year: 2005
      title: "Design and optimization of interplanetary spacecraft trajectories"
      venue: "Ph.D. dissertation, School of Aeronautics and Astronautics, Purdue University; ProQuest / Purdue e-Pubs AAI3166673"
      doi: null
      url: "https://docs.lib.purdue.edu/dissertations/AAI3166673/"
      note: "Comprehensive dissertation; not directly consulted at ingest (Purdue docs.lib not reachable via WebFetch; ProQuest dissertation full text behind subscription). Cycler chapters subsume the AIAA 2002-4420 broad-class enumeration and the JSR 2004 paper."
    - authors: ["Rogers, B. A.", "Hughes, K. M.", "Longuski, J. M.", "Aldrin, B."]
      year: 2012
      title: "Preliminary Analysis of Establishing Cycler Trajectories Between Earth and Mars via V-Infinity Leveraging"
      venue: "AIAA 2012-4746"
      doi: "10.2514/6.2012-4746"
      url: "https://engineering.purdue.edu/AAC/wp-content/uploads/2012/09/EstablishingCyclerTrajectoriesBetweenEarthAndMarsViaV-InfinityLeveraging-AIAA-2012-47461.pdf"
      note: "Table 1 row 'Case 1' is the source of the orbital elements used here. Table 4 STOUR analytic-ephemeris establishment-cycler entry gives the 365-day Earth-to-Mars time-of-flight; Table 3 genetic-algorithm row 4:3(2)- Case 1 reports V_inf flyby of 3.300-3.378 km/s for the establishment trajectory."
  priority_date: "2002-08-05"
  notes: |
    "Case 1" is the third (alongside Case 2 and Case 3) of the two-synodic-
    period ballistic cyclers tabulated in McConaghy/Longuski/Byrnes 2002
    AIAA 2002-4420 and the Byrnes/McConaghy/Longuski 2002 AIAA 2002-4423
    follow-on ("Analysis of Various Two Synodic Period Earth-Mars Cycler
    Trajectories"). The SnLm classification is S2L1: 2 synodic periods,
    1 intermediate Earth-Earth loop between Mars encounters. Russell
    2004 Table 3.4 footnotes only Cases 2 (= Russell 2.1.1.+2) and 3 (=
    Russell 2.3.1.+1) to Byrnes 2002; Case 1 is not footnoted to a
    specific Russell row in the dissertation excerpt visible from the
    UT Austin abstract page, but it shares the same generic family.

    Among the four McConaghy-Byrnes-Longuski 2002 two-synodic-period
    cyclers, Rogers 2012 §III.A flags Case 2 as having the lowest
    launch V_inf and shortest 171-day Earth-Mars flight time in
    the analytic ephemeris (Table 4). Case 1 has the longest first-leg
    ToF (365 d, Rogers Table 4) — implying the spacecraft completes
    roughly one full heliocentric orbit before reaching Mars on its
    first leg, distinguishing it geometrically from Cases 2/3.

    DATA COMPLETENESS: orbital elements (a, e, peri, apo) populated
    from Rogers 2012 Table 1. Steady-state cycling V_inf values left
    null pending direct access to McConaghy 2005 dissertation or the
    AIAA 2002-4420 / JSR 2004 papers. M7 matching against finder hits
    can use the orbital-element signature without the V_inf multiset.

    The 4:3(2)- prefix in Rogers 2012 Tables 3-5 refers to the
    V_inf-leveraging K:L(M)+/- notation introduced in their Nomenclature
    table: K = number of Earth orbit revolutions, L = number of
    spacecraft orbit revolutions, M = spacecraft orbit revolution on
    which the deep-space maneuver is performed, with +/- denoting
    flyby before (-) or after (+) perihelion. This is a separate
    nomenclature from McConaghy's SnLm cycler classification.
  source_quotes:
    a_au: "Rogers et al. 2012 Table 1: 'Case 1 ... Semi-Major Axis, AU: 1.22'."
    e: "Rogers et al. 2012 Table 1: 'Case 1 ... Eccentricity: 0.238'."
    perihelion_au: "Rogers et al. 2012 Table 1: 'Case 1 ... Perihelion Radius, AU: 0.93'."
    aphelion_au: "Rogers et al. 2012 Table 1: 'Case 1 ... Aphelion Radius, AU: 1.51'."
    "legs[0].tof_days": |
      Rogers et al. 2012 Table 4 (STOUR analytic-ephemeris results): row
      'Case 1, 4:3(2)-, LD 12/14/2024, TOF 365 days, Periapse 0.946 AU,
      Apoapse 1.503 AU' — the 365-day TOF for the first leg of the
      establishment-cycler trajectory that matches the Case 1 cycler
      orbital elements.
    "period.years": |
      Period = k * synodic = 2 * 2.135 yr = 4.27 yr; derived from the
      two-synodic-period family membership confirmed by Rogers 2012 §III.A
      "various two synodic period cyclers".

