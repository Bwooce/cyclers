        n_revs: null
        branch: null
        a_au: null
        e: null
        note: "Intermediate Earth-Earth loop arc(s) that fill the cycler period between Mars encounters (sequence E-E-M-M). Russell's required-geocentric-turn column tabulates 3 Earth flyby(s) for this row, implying 2 intermediate Earth-Earth loop(s). Multi-rev arc(s) — tof_days / n_revs / branch / (a,e) to be set by the multi-rev Lambert solver (task #54); represented here as a single structural slot, exact multi-loop topology tracked as uncertain in data_gaps[]."
    maneuvers:                # === OCM MAN ===
      - at_segment_boundary: ["out-em", "ret-me"]
        body: "M"
        type: "flyby-ballistic"
