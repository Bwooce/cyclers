# Liang, Yang, Li, Bai & Qin 2024 — Callisto-Ganymede-Europa (CGE) triple
# cyclers (Jovian moon system). JGCD Engineering Note, doi 10.2514/1.G008387.
# Four ballistic CGCEC members (sequence Callisto->Ganymede->Callisto->Europa->
# Callisto per ~100 d cycle, propagated 10 cycles / ~1000 d). USER-approved
# writeback #216. Mining note: docs/notes/2026-06-11-liang-2024-cge-triple-cyclers-mining.md.
#
# MODELS: members A-C are an IDEALIZED circular-coplanar two-body (Jupiter)
# patched-conic model (golden-grade reproducible up to the unprinted mu_Jupiter
# -> a tolerance caveat); member D is a SPICE-ephemeris (JUP365.bsp) patched-conic
# model with per-flyby data published as figures only (V0). The paper's "Flyby
# Altitude" columns (Tables 3/5/7) are Delta-v-equivalent FICTIONS (paper's own
# caveat, p. 16) — NEVER ingested as physical altitudes. Satellites registry
# (src/cyclerfinder/core/satellites.py) already carries Callisto/Ganymede/Europa
# about Jupiter with sourced JPL SSD GM/SMA (moon-tour #76/#117).
# ---------------------------------------------------------------------------
