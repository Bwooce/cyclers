    Trajectories"). The SnLm classification is S2L1: 2 synodic periods,
    1 intermediate Earth-Earth loop between Mars encounters. Russell
    2004 Table 3.4 footnotes only Cases 2 (= Russell 2.1.1.+2) and 3 (=
    Russell 2.3.1.+1) to Byrnes 2002; Case 1 is not footnoted to a
    specific Russell row in the dissertation excerpt visible from the
    UT Austin abstract page, but it shares the same generic family.

    Among the four McConaghy-Byrnes-Longuski 2002 two-synodic-period
    cyclers, Rogers 2012 §III.A flags Case 2 as having the lowest
    launch V_inf and shortest 171-day Earth-Mars flight time in
    the analytic ephemeris (Table 4). Case 1 has the longest first-leg
