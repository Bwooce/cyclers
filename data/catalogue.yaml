    ballistic) is summarised in docs/known-cyclers.md §3.4.
  source_quotes:
    delta_v_kms: "Derived from Russell 2004's tabulated AR / TR via the M2 powered-flyby surrogate (src/cyclerfinder/core/flyby.py): ΔV ≈ (V∞_E + V∞_M) × max(0, 1 − TR) + (1 − AR) × (V∞_E + V∞_M) × 0.025 [AR-correction term active only when AR < 1]. Upper bound; biases near-ballistic entries toward 'requires nudge'. Strict-ballistic rows (AR ≥ 1 AND TR ≥ 1) give ΔV = 0 exactly. AR/TR primary values: Russell 2004 Table 3.4, row 2.5.1.+0."
    "vinf_kms_at_encounters[0].vinf_kms": "Russell 2004 Table 3.4 row 2.5.1.+0."
    "vinf_kms_at_encounters[1].vinf_kms": "Russell 2004 Table 3.4 row 2.5.1.+0."
    "legs[0].tof_days": "Russell 2004 §3.8: '94-day trip'."
    aphelion_au: "Russell 2004 Table 3.4 Aphelion Ratio 1.44 x 1.52 = 2.189 AU."

# ---------------------------------------------------------------------------
# 5. Niehoff VISIT-1 (inertially-fixed Earth-Mars cycler)
# ---------------------------------------------------------------------------
- id: niehoff-visit1
  name: "Niehoff VISIT-1 Earth-Mars cycler"
  source: literature
  trajectory_regime: ballistic   # added 2026-06-01; v1 catalogue is ballistic-only; field is explicit for future regime expansion
  model_assumption: circular-coplanar   # schema v2 (2026-06-01); circular-coplanar | analytic-ephemeris | cr3bp; see data/README.md
  cycler_class: single-ellipse   # schema v4 (2026-06-03); single-ellipse | multi-arc | non-keplerian; see docs/notes/multi-arc-classification.md
  delta_v_kms: null   # schema v2; near-ballistic / not-extracted — actual value deferred (per-row Russell ΔV extraction)
  v_infinity_leveraging_dv_kms: null   # schema v2; non-null only for Rogers 2012 establishment variants once their values are extracted
  fleet_size: 14   # Rogers et al. 2012, AIAA 2012-4746, Table 1, p.5, row 'VISIT-1' (Number of Vehicles: 14a)
  flyby_mechanics: null   # schema v2; per-encounter turning_angle_deg + min_altitude_km; null = not yet extracted from source
  bodies: ["E", "M"]
  sequence_canonical: "E-M"   # repeats at the cycler's natural period, not synodic-locked
  sense: "n/a"                 # VISIT cyclers are inertially-fixed resonant orbits, no escalator branch
  period:
    pair: "E-M"
    k: 7    # repeats every 7 synodic periods per Rogers 2012 Table 1 footnote 'a'
    years: 14.95   # = 7 * 2.135 yr
    note: |
      REVIEW FIX (2026-05-31): apparent VISIT-1 period anomaly resolved. The
      orbital elements (a = 1.17 AU) yield a heliocentric orbital period of
      P = a^1.5 ≈ 1.265 yr, matching Niehoff's 1985 presentation stating
      VISIT-1 circles the Sun in ~1.25 Earth years. 12 orbits of VISIT-1
      = 12 × 1.25 = 15 yr. In 15 yr Earth completes 15 orbits and Mars
      completes ~8 (8 × 1.88 = 15.04). The 15-year repeating alignment
      (7 Earth–Mars synodic periods = 14.95 yr) quoted in Wikipedia is
      mathematically consistent with the (a = 1.17) elements from Rogers
      2012 footnote 'a': "These cyclers repeat every 7 Earth-Mars synodic
      periods, which usually means that 14 vehicles are needed. However,
      the VISIT cyclers encounter Earth and Mars more often than once every
      15 years, so fewer vehicles are needed."
  vinf_kms_at_encounters:
    - body: "E"
      vinf_kms: null
      note: "VISIT cyclers are inertially-fixed orbits resonant with both Earth and Mars and require no flyby maneuvers, so V_inf is small but not directly tabulated in any of the sources accessible online. Rogers 2012 Table 4 gives V_inf,flyby = 2.834 km/s and V_inf,launch = 2.540 km/s in the analytic ephemeris establishment context — those are establishment quantities, not the cycler's own steady V_inf. TBD: original Niehoff 1985/1986 conference papers needed for the true V_inf."
    - body: "M"
      vinf_kms: null
      note: "Same gap as for Earth — not directly tabulated in accessible sources."
  orbit_elements:
    a_au: 1.17
    e: 0.193
    perihelion_au: 0.94
    aphelion_au: 1.40
    inclination_deg: 0.0
    note: "Per Rogers et al. 2012 Table 1 (citation: Niehoff via McConaghy/Longuski/Byrnes 2002 p. 6). NB Wikipedia gives different aphelion 1.89 AU for VISIT-1 and 1.45 AU for VISIT-2 — that pair seems to come from a different VISIT table (possibly Friedlander 1986). The Rogers 2012 numbers are taken as authoritative here because they come from a single internally-consistent table. See known-cyclers.md outstanding question §C."
    periapse_km: null         # schema v2; parallel to perihelion_au for non-Sun primaries; null if not tabulated
    apoapse_km: null          # schema v2; parallel to aphelion_au for non-Sun primaries
    raan_deg: null            # schema v2; right ascension of ascending node (Ω); null for current entries
    arg_periapsis_deg: null   # schema v2; argument of periapsis (ω); null for current entries
    true_anomaly_deg: null    # schema v2; true anomaly at epoch (ν); null for current entries
    epoch_iso8601: null       # schema v2; ISO-8601 epoch for the anomaly; null = generic
  legs: []
  first_published:
    authors: ["Niehoff, J."]
    year: 1985
    title: "Manned Mars Mission Design"
    venue: "Joint AIAA/Planetary Society Conference 'Steps to Mars', National Academy of Sciences, Washington DC"
    date: "1985-07"
    doi: null
    url: null
    note: "Plus a companion 'IMUSE' presentation, Niehoff 1985 (Woods Hole, Space Science Board, 30 July 1985). The full conference paper is not online. The VISIT cycler concept is attributed to Niehoff in every subsequent secondary source (Rogers 2012 ref [10-12], Russell 2004 ref [9-12], Wikipedia)."
  corroborating_sources:
    - authors: ["Niehoff, J."]
      year: 1986
      title: "Pathways to Mars: New Trajectory Opportunities"
      venue: "American Astronautical Society, AAS Paper 86-172"
      doi: null
      url: null
    - authors: ["Niehoff, J.", "Friedlander, A.", "McAdams, J."]
      year: 1991
      title: "Earth-Mars Transport Cycler Concepts"
      venue: "International Astronautical Congress, IAF Paper 91-438, Oct. 1991"
      doi: null
      url: null
    - authors: ["Friedlander, A. L.", "Niehoff, J. C.", "Byrnes, D. V.", "Longuski, J. M."]
      year: 1986
      title: "Circulating Transportation Orbits Between Earth and Mars"
      venue: "AIAA/AAS Astrodynamics Conference, AIAA 86-2009-CP"
      doi: "10.2514/6.1986-2009"
      url: "https://doi.org/10.2514/6.1986-2009"
      note: "First peer-reviewed venue for VISIT cyclers (covers both VISIT-1 and VISIT-2 as 'inertially fixed' alternatives to the 'up/down escalator' Aldrin cyclers)."
  priority_date: "1985-07-01"
  notes: |
    VISIT-1 (Versatile International Station for Interplanetary Transport — 1)
    is an inertially-fixed heliocentric ellipse resonant with both Earth's and
    Mars's orbital periods. Unlike the Aldrin cycler, no gravity-assist flybys
    are needed to maintain its geometry. Per the spaceflighthistory.blogspot
    summary of Niehoff 1985: "A spacecraft in a VISIT-1 orbit would circle the
    Sun in 1.25 Earth years, encountering Earth four times in five Earth years
    and Mars three times in two Mars years."

    Caveat: secondary sources give inconsistent encounter frequencies for
    VISIT-1. Spaceflighthistory says "4 Earth encounters in 5 years, 3 Mars
    encounters in 2 Mars years"; Wikipedia says "encounters Earth three times
    and Mars four times in 15 years". These imply different orbital elements.
    The Rogers 2012 values (a=1.17, e=0.193) match neither precisely; the
    underlying issue is that several "VISIT-1"-named cyclers appear in the
    literature with slightly different parameter sets. For M7 novelty
    matching, treat the VISIT-1 entry as having a deliberately wide tolerance
    until the Niehoff 1985/1986 originals can be inspected.

    Per Russell 2004 §1.3: "Unlike most other cyclers, the VISIT class of
    cyclers have orbits that are inertially fixed and utilize resonance
    opportunities between the periods of the cycler, Earth, and Mars; and
    thus, require no flyby maneuvers at Earth or Mars."
  source_quotes:
    a_au: "Rogers et al. 2012 Table 1: 'VISIT-1 ... Semi-Major Axis, AU: 1.17'."
    e: "Rogers et al. 2012 Table 1: 'VISIT-1 ... Eccentricity: 0.193'."
    perihelion_au: "Rogers et al. 2012 Table 1: 'VISIT-1 ... Perihelion Radius, AU: 0.94'."
    aphelion_au: "Rogers et al. 2012 Table 1: 'VISIT-1 ... Aphelion Radius, AU: 1.40'."
    "period.years": |
      Rogers et al. 2012 Table 1 footnote a: "These cyclers repeat every 7
      Earth-Mars synodic periods, which usually means that 14 vehicles are
      needed." 7 * 2.135 = 14.95 yr.

