  notes: |
    Family-seed entry, enriched from the FULL IAC-22-C1.6.6 text (#211/#216).
    The paper applies cycler mechanics to lunar logistics (cargo/crew resupply
    between Earth, the Gateway, and the lunar South Pole) by removing the need
    for large rockets in favour of "more frequent but smaller missions". The
    families are near-polar "petal" cyclers in lunar resonance, explored at
    lunar-relative inclination near 90 deg.

    PETAL TAXONOMY (full text, mining note §2):
      - 2-petal (Sec. 2.1): orbits twice per lunar sidereal period (27.3 d);
        the MOST STABLE family; period "~27 +/- 3 days" (Sec. 5, p. 4).
      - 3-petal (Sec. 2.2 / Sec. 5): good NRHO/south-pole access but UNSTABLE
        EVERYWHERE — collapses readily into a 2-petal (or, less often, 5-petal)
        form; periapsis ~200,000 km, inclination < 35 deg; expensive to
        maintain in any configuration.
      - 5-petal (Sec. 2.3): lunar flyby every 53 d, same-pole access every
        163 d; examined over perilune 7,500-15,000 km; greatest accessibility
        flexibility but highly variable inclination.
      - NEGATIVES: no stable 4-petal meeting the period+inclination requirement
        was found; > 5 petals considered infeasible (long periods). (Sec. 2.)

    2-PETAL STABILITY DOMAIN (Sec. 5): "relatively stable and periodic so long
    as the perilune passage was greater than 7500 km and less than ~15,000 km
    in the +/- z direction"; perilune < 7,500 km destabilises (pushed into the
    2-petal formation or a non-resonant orbit); at 20,000 km perilune the lunar
    gravity is insufficient to maintain high lunar inclination. Perilune passes
    alternate N/S poles, so a given pole is reachable every other cycle (Sec. 4).

    MAINTENANCE: lifetime station-keeping dV over 5 cycles is < 50 m/s for all
    5-petal members (about half the per-cycle cost of 2-petal, but each 5-petal
    cycle is ~2x longer; Sec. 5, Figs. 6/8); 2-petal totals on the same < 50 m/s
    scale (Fig. 6). Course-correction burns at perilune and at perigee between
    petals 2-3, assumed impulsive.

    MODEL: the full text NEVER states a dynamical model; internal evidence
    (approximate ~27 +/- 3 d period; per-flyby MCC accumulation; cycle-to-cycle
    inclination/periapsis variation) leans EPHEMERIS-CLASS simulation, so the
    row's model_assumption was reclassified cr3bp -> analytic-ephemeris
    (#211/#216, mirroring the Genova-Aldrin cr3bp -> bicircular precedent).
    V_inf-at-encounters is n/a (these are bound Earth-Moon orbits, not
    hyperbolic-encounter cyclers).

    NO_SOURCED_IC is now PERMANENT with respect to this source (the full text
    is figures-only). The single remaining source-axis lead is the companion
    paper ref [9] (Wittal/Smith/M. 2021).
  source_quotes:
    "first_published.title": |
      NTRS 20220013595 title: "Earth-Moon Cycler Mission Design for
      Lunar Logistics" — Wittal, Miaule, Asher.
    "first_published.venue": |
      NTRS metadata: "International Astronautical Congress, Paris,
      France, September 18-22, 2022, paper IAC-22-C1.6.6".
    notes: |
      Full-text quotes (IAC-22-C1.6.6, mining note §2-3):
      - 2-petal stability domain (Sec. 5): "relatively stable and periodic so
        long as the perilune passage was greater than 7500 km and less than
        ~15,000 km in the +/- z direction".
      - 2-petal period (Sec. 5, p. 4): "approximately 27 +/- 3 days".
      - 4-petal negative (Sec. 2, p. 2): "no stable four-petal cyclers were
        found that could meet the period and inclination requirement".
      - 5-petal cadence (Sec. 2.3, p. 2): lunar flyby once every 53 days,
        access to the same pole once every 163 days.
      - Maintenance (Sec. 5, p. 5): lifetime dV over 5 cycles < 50 m/s for all
        5-petal family members.

