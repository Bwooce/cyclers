        m = number of intermediate Earth-Earth phasing loops
            between successive Mars encounters

      Prefix U / D marks the up-escalator (outbound, post-Earth-flyby
      vehicle headed to Mars) vs. down-escalator (inbound, post-Mars-
      flyby vehicle headed to Earth) branch. The standard nomenclature
      paper (McConaghy/Russell/Longuski 2005, DOI 10.2514/1.8123, JSR
      Vol. 42 No. 4) is the authoritative definition; that paper was
      not directly consulted at ingest (AIAA 403).

