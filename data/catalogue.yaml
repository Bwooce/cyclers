  notes: |
    Sanchez Net 2022 Fig. 2a Cycler 1. Near-ballistic EEM Earth-Mars cycler
    from the JPL STAR patched-conic enumeration. Launch: 05/11/2032,
    C∞ = 17.6 km²/s², Dec. = 43.7 degrees (sourced from Fig. 2a caption).
    Three Mars visits over 15 years (events 3, 6, 9). Max unoptimised Δv =
    5 m/s (event 4). The trajectory is not circular-coplanar; it uses real
    date ephemeris (analytic-ephemeris model).

    The first Mars-to-Mars interval (events 3->6) is ~6.3 yr = ~3 synodic
    periods; the second (events 6->9) is ~4.28 yr = ~2 synodic periods. The
    paper caption states "1 Mars visit every 2 synodic periods" referring to
    the repeating steady-state period (k=2). The initial longer interval is
    a phase-matching artefact of the 2032 launch epoch.

    V∞ multiset (from Fig. 2a, per encounter): Earth encounters 4.283, 3.605,
    3.709, 5.225, 5.234 km/s; Mars encounters 6.207, 5.210, 7.276 km/s.
    Launch v∞ ≈ 4.20 km/s (C∞ = 17.6 km²/s²).
