  - body: "M"
    vinf_kms: 5.210
    note: "SOURCED: Sanchez Net 2022 Fig. 2a event 6 (Mars flyby 10/25/2041): v∞ = 5.210 km/s."
  - body: "E"
    vinf_kms: 5.225
    note: "SOURCED: Sanchez Net 2022 Fig. 2a event 7 (Earth flyby 07/07/2042): v∞ = 5.225 km/s."
  - body: "E"
    vinf_kms: 5.234
    note: "SOURCED: Sanchez Net 2022 Fig. 2a event 8 (Earth flyby 07/18/2044): v∞ = 5.234 km/s."
  - body: "M"
