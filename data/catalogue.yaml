    Russell groups Table 4.13 with the ballistic family throughout
    Chapter 4 (the relaxed TR threshold is treated as a near-ballistic
    perturbation). Consumers doing rigorous powered-flyby ΔV accounting
    should compute the small residual (typically << 100 m/s).

