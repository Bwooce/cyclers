      venue: "Ph.D. dissertation, University of Texas at Austin, Department of Aerospace Engineering"
      doi: null
      url: "http://hdl.handle.net/2152/1253"
      note: "Table 3.9 row 5.1.1.-7: AR=1.04, TR=0.97, E->M days=229, V_inf,E=5.0, V_inf,M=4.3, turning angles [93, 93] deg. Near-ballistic."
  priority_date: "2003-02-09"
  notes: |
    Near-ballistic: AR=1.04, TR=0.97 falls inside Russell's wider net (ARMIN=0.9 / TRMIN=0.85) but does not meet the strict criterion (AR>=1.0 AND TR>=1.0); requires a small powered nudge for full ballistic closure. trajectory_regime kept as 'ballistic' per the cycler literature convention. Russell 2004 Tables 3.9-3.11 catalogue 5- and 6-synodic-period cyclers found at the wider ARMIN=0.9 / TRMIN=0.85 net (vs the strict AR>=1.0 / TR>=1.0 net of Table 3.4). 5-synodic period.

    Required Earth-flyby turning angles per Russell Table 3.9 row 5.1.1.-7: [93, 93] deg.

    Note Russell's nomenclature: the trailing signed index (-7) denotes the Lambert-branch / phasing index of the generic-return solution.
  source_quotes:
    delta_v_kms: "Derived from Russell 2004's tabulated AR / TR via the M2 powered-flyby surrogate (src/cyclerfinder/core/flyby.py): ΔV ≈ (V∞_E + V∞_M) × max(0, 1 − TR) + (1 − AR) × (V∞_E + V∞_M) × 0.025 [AR-correction term active only when AR < 1]. Upper bound; biases near-ballistic entries toward 'requires nudge'. Strict-ballistic rows (AR ≥ 1 AND TR ≥ 1) give ΔV = 0 exactly. AR/TR primary values: Russell 2004 Table 3.9, row 5.1.1.-7."
    "vinf_kms_at_encounters[0].vinf_kms": "Russell 2004 dissertation Table 3.9 row 5.1.1.-7: Earth v_inf (km/s) = 5.0."
