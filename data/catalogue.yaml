  - body: "Moon"
    vinf_kms:
    note: "Same — not in the accessible abstract."
  orbit_elements:
    a_au:
    e:
    perihelion_au:
    aphelion_au:
    inclination_deg: 24   # SOURCED 2026-06-10 (#184): Genova & Aldrin 2015 p.8 — "the 24 degrees contained in the cycler" (geocentric frame).
    inclination_moon_tod_deg: 174   # SOURCED 2026-06-10 (#184): Genova & Aldrin 2015 p.8 — inclination ~174° in the Moon true-of-date (TOD) frame.
    note: |
      Geocentric inclination 24° (p.8); Moon-TOD-frame inclination ~174° (p.8),
      both backfilled 2026-06-10 from the full PDF (#184). Other geocentric
      elements (a, e) are not tabulated in the paper.
    periapse_km:              # schema v2; parallel to perihelion_au for non-Sun primaries; null if not tabulated
