# ===========================================================================
# Russell 2004 dissertation Chapter 4 tables — 2026-06-01
# ===========================================================================
# These entries catalogue Russell 2004's *generalised* nomenclature
# (`<a_max_ssm>.<NNN><sequence-letters><synodic-count>`) covering ballistic
# and near-ballistic Earth-Mars cyclers with period up to 3 synodic periods,
# enumerated by minimax-Lambert global search. The naming is documented at
# /tmp/russell-2004.txt line 7375: "The first number is the simple model
# Earth hyperbolic excess speed, and the last number indicates the simple
# model repeat time in the synodic periods. The sequence of letters in
# between indicate the type and order of the free-returns".
#
# Chapter 4 nomenclature DIFFERS from Chapter 3's `p.h.s.i` convention used
# in earlier russell-ocampo-* entries.
#
# ID convention: `russell-ch4-<russell-code>`. Spaces and special chars in
# the Russell code are preserved verbatim.
#
# The McConaghy 2006 'Notable' cycler (entry 2 mcconaghy-2006-em-k2) is
# the same trajectory as Russell row 4.991gG2 in Table 4.9. Both entries
# remain in the catalogue; M7 collapses them via canonical signature.
# ===========================================================================

# ---------------------------------------------------------------------------
# Russell 2004 Table 4.9 — Ballistic two-synodic period cyclers
# ---------------------------------------------------------------------------
- id: russell-ch4-4.991gG2
  name: "Russell-Ocampo cycler 4.991gG2 (= McConaghy/Longuski/Byrnes 'S1L1' / 'Notable', two-synodic ballistic)"
  source: literature
  trajectory_regime: ballistic
  model_assumption: circular-coplanar   # schema v2 (2026-06-01); circular-coplanar | analytic-ephemeris | cr3bp; see data/README.md
  cycler_class: multi-arc   # schema v4 (2026-06-03); single-ellipse | multi-arc | non-keplerian; see docs/notes/multi-arc-classification.md
  invariants:   # schema v4 (2026-06-03); cycle-level identity for multi-arc cyclers; see docs/spec.md §16.7.4
    aphelion_ratio: null   # not tabulated in this Russell source — see data_gaps[]
    transit_times_days: [150, 150]   # [outbound E->M, return M->E] transit times in days; sourced from trajectory.segments
    turn_ratio: 2.65   # Russell 2004: required turn angle / max ballistic turn (TR >= 1 => strictly ballistic)
  free_return_arcs:   # schema v4.1 (spec §16.7.7); Russell Earth-to-Earth free-return arc descriptors
    - arc_type: generic
      resonance: null
      tof_years: 1.4612
      raw_descriptor: "g(1.4612,526.02,Ll)"
    - arc_type: generic
      resonance: null
      tof_years: 2.8096
      raw_descriptor: "G(2.8096,651.46,U)"
  delta_v_kms: 0.0   # derived from Russell 2004 AR/TR via M2 surrogate; see source_quotes
  v_infinity_leveraging_dv_kms: null   # schema v2; non-null only for Rogers 2012 establishment variants once their values are extracted
  fleet_size: null   # schema v2; integer count; null where not stated by source
  flyby_mechanics: null   # schema v2; per-encounter turning_angle_deg + min_altitude_km; null = not yet extracted from source
  bodies: ["E", "M"]
  sequence_canonical: "E-E-M-M"   # one intermediate Earth encounter + Mars per cycle
  sense: "outbound"
  period:
    pair: "E-M"
    k: 2
    years: 4.27
    note: "2-synodic E-M cycler per Russell 2004 Table 4.9 row 1. Russell footnote 'a' = 'documented in Ref. 15' (McConaghy/Longuski/Byrnes AIAA 2002-4420)."
  vinf_kms_at_encounters:
    - body: "E"
      vinf_kms: 4.99
      note: "Russell 2004 Table 4.9 row 1, column v_inf E (km/s) = 4.99. Cycler code 4.991gG2 leads with this value (the '4.991' prefix in the parent-cycler list, Table 5.5, dissertation line 7512)."
    - body: "M"
      vinf_kms: 5.10
      note: "Russell 2004 Table 4.9 row 1, column v_inf M (km/s) = 5.10."
  orbit_elements:
    a_au: null
    e: null
    perihelion_au: null
    aphelion_au: 1.64
    inclination_deg: 0.0
    note: |
      Russell 2004 Table 4.9 row 1 tabulates aphel = 1.64 AU. (a, e, peri)
      are null because the cycler is a piecewise sequence of two generic-
      return arcs (the leg descriptors are g(1.4612,526.02,Ll) +
      G(2.8096,651.46,U)), not a single Keplerian ellipse — each leg has
