# ===========================================================================
# Russell 2004 dissertation Chapter 4 tables — 2026-06-01
# ===========================================================================
# These entries catalogue Russell 2004's *generalised* nomenclature
# (`<a_max_ssm>.<NNN><sequence-letters><synodic-count>`) covering ballistic
# and near-ballistic Earth-Mars cyclers with period up to 3 synodic periods,
# enumerated by minimax-Lambert global search. The naming is documented at
# /tmp/russell-2004.txt line 7375: "The first number is the simple model
# Earth hyperbolic excess speed, and the last number indicates the simple
# model repeat time in the synodic periods. The sequence of letters in
# between indicate the type and order of the free-returns".
#
# Chapter 4 nomenclature DIFFERS from Chapter 3's `p.h.s.i` convention used
# in earlier russell-ocampo-* entries.
#
# ID convention: `russell-ch4-<russell-code>`. Spaces and special chars in
# the Russell code are preserved verbatim.
#
# The McConaghy 2006 'Notable' cycler (entry 2 mcconaghy-2006-em-k2) is
# the same trajectory as Russell row 4.991gG2 in Table 4.9. Both entries
# remain in the catalogue; M7 collapses them via canonical signature.
# ===========================================================================

# ---------------------------------------------------------------------------
# Russell 2004 Table 4.9 — Ballistic two-synodic period cyclers
# ---------------------------------------------------------------------------
- id: russell-ch4-4.991gG2
  name: "Russell-Ocampo cycler 4.991gG2 (= McConaghy/Longuski/Byrnes 'S1L1' / 'Notable', two-synodic ballistic)"
  source: literature
  trajectory_regime: ballistic
  model_assumption: circular-coplanar   # schema v2 (2026-06-01); circular-coplanar | analytic-ephemeris | cr3bp; see data/README.md
  cycler_class: multi-arc   # schema v4 (2026-06-03); single-ellipse | multi-arc | non-keplerian; see docs/notes/multi-arc-classification.md
  orbit_class: cycler   # schema v4.7 (2026-06-15, task #294); scope expansion default — every pre-v4.7 row is a strict cycler (scripts/migrate_catalogue_scope_2026-06-15.py); see data/README.md
  epoch_locked: false   # schema v4.7 (task #294); strict cyclers are NOT epoch-locked
  n_returns: infinite   # schema v4.7 (task #294); strict cyclers complete an unbounded number of returns
  validation_level: V3   # schema v4.5 (2026-06-06, spec §16.7.12 / §14); MECHANICAL gauntlet level from recorded test evidence (scripts/backfill_validation_level.py); see data/README.md
  orbit_source: russell-2004-t49_413   # schema v4.4 (2026-06-05); provenance tag back-filled from this row's existing source metadata (scripts/backfill_provenance_tags.py); see data/README.md
  orbit_fidelity: circular-coplanar
  vinf_source: russell-2004-t49_413
  vinf_fidelity: circular-coplanar
  invariants:   # schema v4 (2026-06-03); cycle-level identity for multi-arc cyclers; see docs/spec.md §16.7.4
