    Sanchez Net 2022 Fig. 2b Cycler 2. Near-ballistic EM Earth-Mars cycler
    from the JPL STAR patched-conic enumeration. Launch: 01/02/2034,
    C∞ = 10.7 km²/s² (v∞ ≈ 3.27 km/s) — sourced from Fig. 2b caption.
    Two Mars visits over ~15 years (events 2, 5). Max unoptimised Δv =
    7 m/s (event 3). The trajectory uses real-date ephemeris (analytic-
    ephemeris model).

    Period between Mars visits (events 2→5): 2875 days = 7.87 yr. Caption
    states "8 years between Mars 1 and 2" (rounded). The macro label "EM"
    (Sanchez Net §III.A) describes one Mars visit per cycle; the actual
    encounter sequence (E→M→E→E→M→E→E) has two intermediate Earth flybys
    per cycle, giving sequence_canonical "E-E-E-M" (lex-min 4-node cycle).

    ANOMALY: The first ME transit (events 2→3, Dec 2037→Oct 2040) is 1026
    days (~33.5 months, ~2.81 yr). This exceeds the paper's own batch-1
    bound of <12 months per ME leg (§III.A, p. 863). This is the observed
    Fig. 2b value; the discrepancy is recorded as a data_gap anomaly and
    NOT discarded — it may indicate this cycler was from a different batch
    or an anomalous trajectory in the STAR database. The identical ME
    duration reappears at events 5→6 (1026 days), suggesting the value is
    internally consistent even if it violates the stated batch-1 bound.

    V∞ multiset (from Fig. 2b, per encounter): Earth encounters 3.090,
    5.285, 5.721 km/s; Mars encounters 6.466, 6.871 km/s.
    Launch v∞ ≈ 3.27 km/s (C∞ = 10.7 km²/s²).
