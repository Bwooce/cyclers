      compared to the Hohman value of 2.57 km/s." Table 3.4 rounds to 2.5.
    "legs[0].tof_days": "Russell 2004 Table 3.4 row 4.3.1.-5: 268 d."
    aphelion_au: |
      Russell 2004 §3.8: "The Aphelion Ratio is 0.992, thus the cycler
      doesn't quite reach Mars in the simplified model."

