  model_assumption: analytic-ephemeris   # CORRECTED 2026-06-05 (was circular-coplanar): AAS 17-577 p.5 — "A zero-sphere-of-influence patched conic gravity model is used with the real planetary ephemeris, and Lambert's problem is solved". The circular-coplanar Tisserand graph (Fig.2) is only the qualitative explanatory tool; the solutions are real-ephemeris.
