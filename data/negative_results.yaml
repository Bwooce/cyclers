- id: cross_system_se_em_L2_patched_cr3bp
  issue: 405
  method: patched-CR3BP SE<->EM connection matcher + bounded closure search (#405 Phase A)
  regime: Sun-Earth + Earth-Moon coupled CR3BP (patched, inertial-frame match)
  failed_rung: closure-search
  physical_reason: 'BOTH cross-system connection legs exist at low dV: forward EM-L2->SE-L2 closes at pos gap ~0.4 km / dV ~0.36 km/s, and the SE->EM RETURN leg closes at pos gap ~30 km / dV ~0.15 km/s (validated by test_se_to_em_return_leg_converges). CORRECTION (2026-06-20, #411): the earlier "return leg does not close / narrow-basin scale mismatch" claim was a CODE BUG, not physics -- correct_cross_connection hardwired from=EM/to=SE and propagated the return-leg SE manifold in the EM system (garbage). With each manifold propagated in its own system the return converges. What remains OPEN is the closed CYCLE: a theta-TIME-CONSISTENCY analysis (2026-06-20) quantifies the gate. The forward EM-L2->SE-L2 transit takes ~52 days, over which the SE-EM relative phase advances ~4.88 rad (omega_rel = 2.47e-6 rad/s); the time-consistent prediction theta_f + omega_rel*t_fwd does NOT match the independently-converged return-leg theta_r -- a ~2.2 rad gap AT SINGLE REVOLUTION. The cycle therefore does not close at one rev; that 2.2 rad must be absorbed by MULTI-REVOLUTION phasing (extra orbit revs each advance theta) -- the patched-model analog of the ~19yr Metonic (235:19) commensurate return (note #316). (The bounded search''s cost-tuned return config still under-resolves and reports the return non-converged; a full-scan return converges.)'
  resweep_condition: 'Both spatial legs exist at low dV, so the open work is PHASE closure. The (n_em=41, n_se=19) ~11yr "feasibility" (2026-06-20-411-theta-closure-feasibility.md) was SUPERSEDED (2026-06-20, docs/notes/2026-06-20-411-amplitude-theta-closure.md): it held both amplitudes FIXED and is physically INFEASIBLE -- a manifold seeded at eps shadows its orbit only ~ln(eps_range)/ln(|lambda_u|) revs before exponential departure, and the EM-L2 Lyapunov |lambda_u|~1.2e3 caps that at ~2-4 revs (n_em=41 is >10x over budget). The CORRECT model: amplitude is a continuous phase knob -- over each Lyapunov family Delta-theta(C) mod 2pi sweeps ~the full circle (EM 89%, SE 69%), the EM side doing so WITHIN its 2-4 rev shadow budget. So the theta-closure equation at n_em=n_se=1 is ONE equation in TWO continuous amplitude knobs -> a 1-D solution curve exists at SINGLE revolution. Productive next step: a coupled single-rev corrector -- free vars (c_em, c_se) + both legs'' phases + theta at n=1; residual = both inertial position gaps + theta-time-consistency; solve along the closure curve and read the patch dV, with rigorous Radau verification before any closed-cycle claim. Sufficiency (does patch dV stay LOW on the theta-closure curve?) is the open question. Alternative venue: BCR4BP Phase B with an SE-scale seed (#412). NOT a multi-revolution corrector and NOT a finer fixed-amplitude grid. UPDATE (2026-06-20, docs/notes/2026-06-20-411-corrector-outcome.md): the coupled single-rev corrector (correct_cross_cycle, committed f563ab3) was BUILT and run on EM-L2/SE-L2 n=(1,1). Both legs stay ballistic-cheap (~0.8 km/s total, ~1.06 yr) but the Newton STALLS: it closes R1 (->0.008) while R2 floors at ~-0.58 -> |R| stalls at ~0.59 rad, NOT closed. Working hypothesis (not firmly established; standalone diagnostics were confounded by the connection-curve coupling + return-branch selection): the both-legs-converged set is a CURVE in (c_em, c_se), so only ONE phase DOF is available -- it zeroes one of the two consistency residuals, not both. So the amplitude-knob feasibility OVER-counted the DOF (the connection-existence constraint removes one). MULTI-REV CONFIRMED (2026-06-20): re-running at n=(1,2) plateaus at |R|~0.78 rad (vs ~0.59 at n=(1,1)) -- a discrete extra revolution SHIFTS the residual floor but does not reach zero, the predicted 1-DOF signature (rev-count changes the offset, not the dimensionality). So the patched-CR3BP EM-L2/SE-L2 route is a CHARACTERIZED NEGATIVE at single AND low-multiple revolution; legs remain ballistic-cheap (~0.8 km/s) so the block is phase-closure dimensionality, not energy. Resweep (NOT more revolutions / finer grids): (1) other libration pairs (L1/L1, L1/L2) -- may give a 2-D both-converged region = two real amplitude knobs; (2) BCR4BP with an SE-scale seed (#412 re-scope), where phase closure is well-posed by construction. A pseudo-arclength continuation along the L2/L2 connection curve would formally prove the 1-DOF obstruction but the empirical stalls already establish it.'
  audit_425: '#425 audit (2026-06-23, HEAD 4daa977): NO FLIP vs #198 epoch fix (439d279) or #426/#428 flyby-floor fix (fbe7e56+4daa977). Binding constraint untouched (real-eph fails by ~1e9 km / structural; ballistic fails at single-ellipse closure upstream of any flyby-bend budget; CR3BP/BCR4BP have no epoch & no flyby). See docs/notes/2026-06-23-425-negative-registry-staleness-audit.md'
- id: bcr4bp_phase_b_em_libration_seed
  issue: 412
  method: 'BCR4BP mu_sun-continuation reach spike (EM-L1 Lyapunov seed; #412 Phase-B scoping)'
  regime: Sun-Earth-Moon BCR4BP (Andreu 1998, coherent 4-body)
  failed_rung: scoping-spike
  physical_reason: 'An Earth-Moon-libration family is the WRONG vehicle for a both-region-spanning cross-system cycle. For EM-L1 Lyapunov seeds (C=3.1294/3.05/2.95) cast into the BCR4BP and mu_sun-continued, the max Earth-relative reach stays ~0.9-1.16 lunar distances (LD) -- flat under the Sun term, nowhere near the 3.90 LD needed to span to the Sun-Earth-L region (1.5e6 km patch plane). Two signals agree: (1) reach does not trend upward as mu_sun grows; (2) the family does not survive continuation to full Sun strength -- each walk broke after 9-12 of 40 steps (reached only mu_sun~16-44 vs the full 328900). EM-libration orbits are Earth-Moon-Hill-bounded; turning on the Sun neither stretches them outward nor preserves the family to full strength. See docs/notes/2026-06-20-412-bcr4bp-reach-spike.md.'
  resweep_condition: 'NOT from the EM-libration family -- that route is structurally closed. The geometrically correct BCR4BP vehicle is a Sun-Earth-scale seed (an SE-libration orbit or a transfer manifold reaching the 3.9 LD region), which is a from-scratch Phase-B build, not a continuation of the EM family. Resweep when such an SE-scale BCR4BP seed family is built. Near-term, the patched-model #411 multi-rev theta-closure corrector is the more direct venue.'
  audit_425: '#425 audit (2026-06-23, HEAD 4daa977): NO FLIP vs #198 epoch fix (439d279) or #426/#428 flyby-floor fix (fbe7e56+4daa977). Binding constraint untouched (real-eph fails by ~1e9 km / structural; ballistic fails at single-ellipse closure upstream of any flyby-bend budget; CR3BP/BCR4BP have no epoch & no flyby). See docs/notes/2026-06-23-425-negative-registry-staleness-audit.md'
