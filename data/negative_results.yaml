- id: cross_system_se_em_L2_patched_cr3bp
  issue: 405
  method: patched-CR3BP SE<->EM connection matcher + bounded closure search (#405
    Phase A)
  regime: Sun-Earth + Earth-Moon coupled CR3BP (patched, inertial-frame match)
  failed_rung: closure-search
  physical_reason: 'BOTH cross-system connection legs exist at low dV: forward
    EM-L2->SE-L2 closes at pos gap ~0.4 km / dV ~0.36 km/s, and the SE->EM RETURN leg
    closes at pos gap ~30 km / dV ~0.15 km/s (validated by
    test_se_to_em_return_leg_converges). CORRECTION (2026-06-20, #411): the earlier
    "return leg does not close / narrow-basin scale mismatch" claim was a CODE BUG, not
    physics -- correct_cross_connection hardwired from=EM/to=SE and propagated the
    return-leg SE manifold in the EM system (garbage). With each manifold propagated in
    its own system the return converges. What remains OPEN is the closed CYCLE: the two
    legs converge INDEPENDENTLY at incompatible relative phases (theta_fwd~4.94,
    theta_ret~2.53; Delta theta ~2.4 rad), so simultaneous theta-commensurate closure
    (periodic-up-to-rotation) is the unmet gate -- consistent with the ~19yr Metonic
    (235:19) prediction (note #316). (The bounded search''s cost-tuned return config
    still under-resolves and reports the return non-converged; a full-scan return
    converges.)'
  resweep_condition: 'Both spatial legs exist at low dV, so the open work is PHASE
    closure, not the connections. Productive path: a continuation that enforces
    theta-consistency across both legs (track the converged forward+return connections
    jointly in energy/theta toward a commensurate return) and/or a multi-revolution /
    Metonic-commensurate formulation; or BCR4BP Phase B (coherent 4-body). NOT a finer
    single-revolution grid.'
