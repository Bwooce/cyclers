- id: cross_system_se_em_L2_patched_cr3bp
  issue: 405
  method: patched-CR3BP SE<->EM connection matcher + bounded closure search (#405
    Phase A)
  regime: Sun-Earth + Earth-Moon coupled CR3BP (patched, inertial-frame match)
  failed_rung: closure-search
  physical_reason: 'Forward EM-L2->SE-L2 leg closes near-ballistically (pos gap ~0.4
    km, dV ~0.36 km/s), but the SE->EM return leg does not co-reach the patch section
    on a bounded single-revolution grid and theta does not return commensurately;
    closed=False. Consistent with the ~19yr Metonic (235:19) natural-closure prediction
    (note #316), which lies outside any bounded single-revolution grid.'
  resweep_condition: BCR4BP Phase B refinement (coherent 4-body resonant closure)
    OR a multi-revolution / Metonic-commensurate grid with longer integration horizons.
