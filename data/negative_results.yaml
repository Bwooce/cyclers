  result_388: "RUN 2026-06-23 (#388): descriptor ingested (McConaghy-2005 Table 2; free_return_arcs g/f/h, repeat-constraint Sum t_f=8.5714=4S exact) and run through close_multiarc_row (lambert, 25 seeds, nfev 400+900 identical). Residual TRUE FLOOR 0.485 km/s (NOT closed to 0.1 gate), total dV ~0.995 km/s. CRITICALLY: emerged Vinf RECOVERS the sourced anchor (Earth ~3.04 vs 3.1; Mars ~2.5 vs 2.5) -- unlike S1L1 and the V3 rows which collapse off-anchor. So the #388 wall is ENERGY-SELECTIVE not universal: low-energy near-Hohmann cyclers recover anchor. 4.3.1-5 is near-ballistic (Russell AR=0.99 'small powered nudge'), so 0.485 km/s may be the genuine DSM. NOT a clean V0->V1 ballistic close; promotion pending a Mars-perihelion epoch trial + independent cross-check. See docs/notes/2026-06-23-388-russell-ocampo-4.3.1-5-anchor-recovery.md"
