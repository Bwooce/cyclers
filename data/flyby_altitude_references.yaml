# Per-body flyby / closest-approach / periapsis altitude reference table (#428).
#
# Sourced from the corpus mining sweep, docs/notes/2026-06-23-flyby-altitude-corpus-mining.md
# (which read ~98 docs/notes digests). This file is REFERENCE/PROVENANCE data — the
# model bend/Delta-V floor lives in PLANETS[].safe_alt_km / SatelliteData.safe_alt_km
# (constants.py / satellites.py). These observed/design values cross-check those floors
# and document "what altitudes have actually been flown / designed" per body.
#
# confidence tags:
#   sourced    - literature-stated (a published table/figure/text quoted in the digest).
#   secondary  - NASA fact-sheet / ESA portal / Wikipedia cross-check (not the primary paper).
#   derived    - computed by OUR code (SPK / Horizons extraction). High fidelity but NOT
#                literature-sourced => not golden-test-eligible (golden-tests-sourced-only).
# type vocabulary: design-floor | observed-flown | aim-point | design-CA
# Each entry: {altitude_km, type, mission, date, citation, confidence}.
# Giant-planet altitudes are CA_radius - 1-bar equatorial radius (see note units section).

