# Local presubmit: mirrors the CI lint job (.github/workflows/ci.yml).
# Activate once per clone with: uv run pre-commit install
# Run manually across the tree with: uv run pre-commit run --all-files
repos:
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.29.4
    hooks:
      - id: check-jsonschema
        files: ^data/catalogue\.yaml$
        args: ["--schemafile", "data/catalogue.schema.json"]
      - id: check-jsonschema
        name: check-jsonschema (cycler_networks.yaml)
        files: ^data/cycler_networks\.yaml$
        args: ["--schemafile", "data/cycler_network.schema.json"]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15  # keep in sync with the ruff dev-dependency in pyproject.toml
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      # Mirrors the CI Mypy stage. Runs in the uv-managed venv so it sees
      # the same stubs/extras CI does (run `uv sync --all-extras` once).
      # Checks the whole tree, not just staged files, since mypy is
      # project-global; pass_filenames: false keeps pre-commit from
      # appending paths to the command.
      - id: mypy
        name: mypy
        entry: uv run mypy src tests
        language: system
        types: [python]
        pass_filenames: false
      # Catalogue-ratchet gate (the 2026-06-19 #399 lesson): any
      # data/catalogue.yaml row add/remove/edit ripples into several frozen-
      # census ratchet tests + consumers (cycler_class / validation_tier /
      # rediscovery census, schema, multi-arc invariants, verdict-tier). A
      # missed ratchet turns CI red. This hook runs the census/ratchet gates on
      # the staged catalogue so the breakage surfaces locally, before push.
      # Fires ONLY when data/catalogue.yaml is staged (the only thing that moves
      # these counts); the slow optimizer-rediscovery test is excluded -- only
      # the fast census-classification assertions run (~70 s).
      - id: catalogue-ratchets
        name: catalogue ratchets
        entry: >-
          uv run pytest
          tests/data/test_cycler_class_census.py
          tests/data/test_validation_tier_census.py
          tests/data/test_validate_catalogue.py
          tests/data/test_schema_v47_orbit_class.py
          tests/data/test_multi_arc_invariants.py
          tests/verify/test_verdict_tier_census.py
          tests/test_catalogue_rediscovery.py::test_census_breakdown_matches_frozen_ratchet
          tests/test_catalogue_rediscovery.py::test_census_classifies_every_entry_exactly_once
          tests/test_catalogue_rediscovery.py::test_census_constructible_set_agrees_with_loader
          -q
        language: system
        files: ^data/catalogue\.yaml$
        pass_filenames: false
      # Cycler-network registry gate (task #570): any data/cycler_networks.yaml
      # edit (or a change to the schema/validator themselves) re-runs the
      # referential-integrity + taxi-cost cross-check ratchet locally, before
      # push -- mirrors the catalogue-ratchets hook above.
      - id: cycler-network-ratchets
        name: cycler network ratchets
        entry: uv run pytest tests/data/test_cycler_networks.py -q
        language: system
        files: ^(data/cycler_networks\.yaml|data/cycler_network\.schema\.json|src/cyclerfinder/data/validate_networks\.py)$
        pass_filenames: false
