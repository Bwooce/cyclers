# Local presubmit: mirrors the CI lint job (.github/workflows/ci.yml).
# Activate once per clone with: uv run pre-commit install
# Run manually across the tree with: uv run pre-commit run --all-files
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15  # keep in sync with the ruff dev-dependency in pyproject.toml
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      # Mirrors the CI Mypy stage. Runs in the uv-managed venv so it sees
      # the same stubs/extras CI does (run `uv sync --all-extras` once).
      # Checks the whole tree, not just staged files, since mypy is
      # project-global; pass_filenames: false keeps pre-commit from
      # appending paths to the command.
      - id: mypy
        name: mypy
        entry: uv run mypy src tests
        language: system
        types: [python]
        pass_filenames: false
